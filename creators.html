<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; position: relative; z-index: 20;">
    <h2 style="font-size: 28px; font-weight: 800; margin: 0;">Ye saare creators hain ITB ke paas।</h2>
    <button onclick="window.triggerGmailVerificationWorkflow()" style="background: transparent; border: 1px solid #00e676; color: #00e676; padding: 10px 24px; border-radius: 12px; font-weight: 600; cursor: pointer; position: relative; z-index: 30;">Join ITB</button>
</div>

<div id="cards-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 24px; position: relative; z-index: 20;">
    <div class="loading-placeholder" style="color: rgba(255,255,255,0.4); font-size: 16px; padding: 20px;">Loading directory metadata...</div>
</div>

<script type="module">
import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

async function loadDynamicCreators() {
    const grid = document.getElementById('cards-grid');
    const db = window.appDb;
    if(!db) return;

    try {
        const querySnapshot = await getDocs(collection(db, "creators"));
        
        // CRITICAL FIX: Empty the placeholder element context entirely before rendering database records
        grid.innerHTML = '';

        if(querySnapshot.empty) {
            grid.innerHTML = `<div style="color: rgba(255,255,255,0.4); padding: 20px;">No registered creators found inside the repository.</div>`;
            return;
        }

        querySnapshot.forEach((doc) => {
            const data = doc.data();
            const profilePic = data.avatarUrl || "https://api.dicebear.com/7.x/bottts/svg?seed=" + doc.id;
            
            // Check cross-compatible context properties for alias naming
            const displayName = data.asaName || data.brandName || data.realName || "Anonymous Creator";
            
            const cardHtml = `
                <div style="background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 20px; padding: 24px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.3);">
                    <img src="${profilePic}" style="width: 110px; height: 110px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; border: 2px solid #00e676;">
                    <h3 style="margin: 0 0 6px 0; font-size: 20px; font-weight: 700;">${displayName}</h3>
                    <p style="margin: 0 0 16px 0; color: rgba(255,255,255,0.5); font-size: 13px;">
                        <i class="fa-solid fa-location-dot" style="color:#00e676; margin-right: 5px;"></i> ${data.state || 'India'}
                    </p>
                    <div style="display: flex; justify-content: center; gap: 14px;">
                        ${data.youtubeLink ? `<a href="${data.youtubeLink}" target="_blank" style="color: #ff0000; font-size: 18px;"><i class="fa-brands fa-youtube"></i></a>` : ''}
                        ${data.instagramLink ? `<a href="${data.instagramLink}" target="_blank" style="color: #e1306c; font-size: 18px;"><i class="fa-brands fa-instagram"></i></a>` : ''}
                    </div>
                    <div style="font-size: 11px; color: #00e676; margin-top: 14px; text-transform: uppercase; font-weight:700; background: rgba(0,230,118,0.06); padding: 4px 10px; border-radius: 20px; display: inline-block;">
                        ${data.category || 'Tech & AI'}
                    </div>
                </div>
            `;
            grid.innerHTML += cardHtml;
        });
    } catch (error) {
        console.error("Firestore loading failure context:", error);
        grid.innerHTML = `<div style="color: #ff4444; padding: 20px;">Failed to initialize public creator stream.</div>`;
    }
}

// Fire runtime query compilation instantly
loadDynamicCreators();
</script>
