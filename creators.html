<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ─── MAIN CONTAINER CONFIGURATION ─── */
.creators-page-container {
    display: flex;
    flex-direction: column;
    width: 100%;
    height: calc(100vh - 150px); /* Taki outer border ke andar perfect fit ho aur scrollbar andar aaye */
    overflow: hidden;
    position: relative;
}

/* ─── FIXED HEADER SECTION (Scroll ke time fixed rahega) ─── */
.creators-header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(4, 16, 16, 0.85); /* Smooth blending with background */
    backdrop-filter: blur(15px);
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 10px 24px 10px;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    margin-bottom: 20px;
}

.creators-header h2 {
    font-size: 42px !important;
    font-weight: 900;
    letter-spacing: -1px;
    margin: 0;
    color: #fff;
}

/* 👑 DYNAMIC FORCED HOVER EFFECTS FOR JOIN BUTTON */
.join-itb-btn {
    height: 48px;
    padding: 0 28px;
    border: 1px solid rgba(0, 230, 118, 0.4);
    border-radius: 12px;
    background: rgba(0, 230, 118, 0.04);
    color: #00e676;
    font-size: 14px;
    font-weight: 800;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    cursor: pointer;
    transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* ─── CARDS SCROLLABLE GRID (1 Line me 6 Cards) ─── */
.creators-grid {
    flex: 1;
    overflow-y: auto;
    padding: 10px;
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr)); /* Exactly 6 cards in a row */
    gap: 20px;
    scroll-behavior: smooth;
}

/* Custom Scrollbar inside the container */
.creators-grid::-webkit-scrollbar {
    width: 6px;
}
.creators-grid::-webkit-scrollbar-track {
    background: transparent;
}
.creators-grid::-webkit-scrollbar-thumb {
    background: rgba(0, 230, 118, 0.2);
    border-radius: 10px;
}
.creators-grid::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 230, 118, 0.4);
}

/* ─── CREATOR CARD DESIGN (9:16 Aspect Ratio Look) ─── */
.creator-card {
    background: rgba(255, 255, 255, 0.015) !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
    backdrop-filter: blur(10px) !important;
    border-radius: 20px;
    padding: 24px 16px 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    aspect-ratio: 9 / 14; /* 9:16 vertical styling for standard viewports */
    justify-content: space-between;
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.creator-card:hover {
    border-color: rgba(0, 230, 118, 0.3) !important;
    background: rgba(0, 230, 118, 0.02) !important;
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0, 230, 118, 0.1);
}

/* Card Top Sub-header */
.card-node-info {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
}

.online-dot {
    width: 6px;
    height: 6px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 8px #00e676;
}

/* Avatar Circle */
.avatar-container {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 1px dashed rgba(0, 230, 118, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 15px 0 10px 0;
    position: relative;
}

.avatar-inner {
    width: 73px;
    height: 73px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.avatar-inner i {
    font-size: 28px;
    color: #00e676;
}

/* Creator Identity */
.creator-details {
    text-align: center;
    width: 100%;
}

.creator-name {
    font-size: 20px;
    font-weight: 800;
    color: #fff;
    margin: 0 0 4px 0;
    letter-spacing: -0.5px;
}

.creator-location {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 12px;
}

.creator-location i {
    color: #00e676;
    font-size: 11px;
}

/* Tags */
.creator-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.tag {
    background: rgba(0, 230, 118, 0.05);
    border: 1px solid rgba(0, 230, 118, 0.15);
    color: #00e676;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
}

/* Stats Block inside Card */
.card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    margin-top: auto;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 12px;
}

.stat-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 8px;
    text-align: center;
}

.stat-box i {
    font-size: 12px;
    margin-bottom: 4px;
}

.stat-box .fa-youtube { color: #ff0000; }
.stat-box .fa-instagram { color: #e1306c; }

.stat-num {
    font-size: 15px;
    font-weight: 900;
    color: #fff;
    line-height: 1.2;
}

.stat-label {
    font-size: 9px;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.4);
    letter-spacing: 0.5px;
    margin-top: 1px;
}

/* ─── RESPONSIVE BREAKPOINTS ─── */
@media(max-width: 1400px) {
    .creators-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media(max-width: 1100px) {
    .creators-page-container { height: auto; overflow: visible; }
    .creators-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); overflow: visible; }
    .creators-header { position: relative; flex-direction: column; gap: 15px; align-items: flex-start; }
}
@media(max-width: 600px) {
    .creators-grid { grid-template-columns: 1fr; }
}
</style>

<div class="creators-page-container">
    <div class="creators-header">
        <h2>Creators Profile</h2>
        <button class="join-itb-btn" id="join-itb-btn">Join iTalentBuddy</button>
    </div>

    <div class="creators-grid">
        
        <div class="creator-card">
            <div class="card-node-info">
                <span>Node // SEC_01</span>
                <div class="online-dot"></div>
            </div>
            <div class="avatar-container">
                <div class="avatar-inner">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            <div class="creator-details">
                <div class="creator-name">ikla Pikla</div>
                <div class="creator-location"><i class="fa-solid fa-location-dot"></i> Uttar Pradesh</div>
                <div class="creator-tags">
                    <span class="tag">Gaming</span>
                    <span class="tag">Entertainment</span>
                </div>
            </div>
            <div class="card-stats">
                <div class="stat-box">
                    <i class="fa-brands fa-youtube"></i>
                    <div class="stat-num">1K</div>
                    <div class="stat-label">Subs</div>
                </div>
                <div class="stat-box">
                    <i class="fa-brands fa-instagram"></i>
                    <div class="stat-num">2K</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>
        </div>
        <script>
            const grid = document.querySelector('.creators-grid');
            const sampleCardHtml = `
            <div class="creator-card">
                <div class="card-node-info">
                    <span>Node // SEC_02</span>
                    <div class="online-dot"></div>
                </div>
                <div class="avatar-container">
                    <div class="avatar-inner">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="creator-details">
                    <div class="creator-name">Alpha Creator</div>
                    <div class="creator-location"><i class="fa-solid fa-location-dot"></i> Delhi, India</div>
                    <div class="creator-tags">
                        <span class="tag">Vlogs</span>
                        <span class="tag">Tech</span>
                    </div>
                </div>
                <div class="card-stats">
                    <div class="stat-box">
                        <i class="fa-brands fa-youtube"></i>
                        <div class="stat-num">45K</div>
                        <div class="stat-label">Subs</div>
                    </div>
                    <div class="stat-box">
                        <i class="fa-brands fa-instagram"></i>
                        <div class="stat-num">120K</div>
                        <div class="stat-label">Followers</div>
                    </div>
                </div>
            </div>`;
            
            // Loop running 23 times to create total 24 cards
            for(let i = 0; i < 23; i++) {
                grid.insertAdjacentHTML('beforeend', sampleCardHtml);
            }
        </script>

    </div>
</div>
