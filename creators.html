<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* 🌍 MAIN CONTENT WRAPPER */
.creators-page-container {
    display: flex !important;
    flex-direction: column !important;
    width: 100% !important;
    height: 100% !important;
    overflow: hidden !important; /* पूरे पेज को स्क्रोल होने से रोकता है */
}

/* 🏔️ TOP HEADER SECTION */
.creators-header {
    display: flex !important;
    justify-content: space-between !important;
    align-items: center !important;
    padding-bottom: 24px !important;
    border-bottom: 1px solid rgba(255, 255, 255, 0.05) !important;
    flex-shrink: 0 !important;
    height: 70px !important; /* हेडिंग चेंज होते वक्त लेआउट को हिलने से रोकने के लिए फिक्स्ड हाइट */
}

.creators-header h2 {
    font-size: 26px !important;
    font-weight: 800 !important;
    letter-spacing: -0.5px !important;
    margin: 0 !important;
    color: #fff !important;
    max-width: 75% !important;
    line-height: 1.3 !important;
    transition: opacity 0.2s ease, font-size 0.2s ease !important;
}

/* ⚡ "JOIN ITB" BUTTON STYLE */
.join-itb-btn {
    background: rgba(0, 230, 118, 0.04) !important;
    color: #00e676 !important;
    padding: 12px 24px !important;
    border: 1px solid rgba(0, 230, 118, 0.3) !important;
    border-radius: 12px !important;
    font-size: 14px !important;
    font-weight: 700 !important;
    cursor: pointer !important;
    letter-spacing: 0.5px !important;
    white-space: nowrap !important;
    box-shadow: 0 4px 15px rgba(0, 230, 118, 0.05) !important;
    transition: all 0.3s ease !important;
}

.join-itb-btn:hover {
    background: #00e676 !important;
    color: #010707 !important;
    box-shadow: 0 0 25px rgba(0, 230, 118, 0.4) !important;
}

/* 📜 SCROLLABLE CARDS SECTION */
.creators-grid-scroll {
    flex: 1 !important;
    overflow-y: auto !important; /* सिर्फ कार्ड वाला बड़ा बॉक्स स्क्रोल होगा */
    padding-top: 24px !important;
    padding-right: 4px !important;
}

/* Custom Scrollbar */
.creators-grid-scroll::-webkit-scrollbar { width: 6px; }
.creators-grid-scroll::-webkit-scrollbar-track { background: transparent; }
.creators-grid-scroll::-webkit-scrollbar-thumb { background: rgba(0, 230, 118, 0.2); border-radius: 10px; }
.creators-grid-scroll::-webkit-scrollbar-thumb:hover { background: rgba(0, 230, 118, 0.5); }

.creators-grid {
    display: grid !important;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)) !important;
    gap: 20px !important;
    padding-bottom: 30px !important;
}

/* 🎴 CREATOR CARD STYLES */
.creator-card {
    background: rgba(4, 16, 16, 0.2) !important;
    border: 1px solid rgba(255, 255, 255, 0.04) !important;
    border-radius: 20px !important;
    padding: 24px 20px !important;
    text-align: center !important;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1) !important;
}

/* Hover Effect for Standard/Male Cards */
.creator-card:hover {
    border-color: #00e676 !important;
    background: rgba(0, 230, 118, 0.02) !important;
    box-shadow: 0 10px 30px rgba(0, 230, 118, 0.1) !important;
    transform: translateY(-4px) !important;
}

/* 🚺 FEMALE CARD SPECIAL STYLE */
.creator-card.female-card {
    border: 1px solid rgba(255, 105, 180, 0.2) !important; /* Soft Pink Border */
}
.creator-card.female-card:hover {
    border-color: #ff69b4 !important;
    background: rgba(255, 105, 180, 0.02) !important;
    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.12) !important;
}

/* CARD DETAILS */
.creator-avatar-wrapper {
    width: 110px !important;
    height: 110px !important;
    margin: 0 auto 16px auto !important;
}

.creator-avatar {
    width: 100% !important;
    height: 100% !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    border: 2px solid rgba(255, 255, 255, 0.08) !important;
    transition: border-color 0.3s ease !important;
}
.creator-card:hover .creator-avatar { border-color: #00e676 !important; }
.creator-card.female-card:hover .creator-avatar { border-color: #ff69b4 !important; }

.creator-name { font-size: 19px !important; font-weight: 700 !important; margin: 0 0 6px 0 !important; color: #fff !important; }
.creator-location { font-size: 13px !important; color: #cbdad1 !important; margin: 0 0 20px 0 !important; display: flex !important; align-items: center !important; justify-content: center !important; gap: 5px !important; }

/* 🌐 SOCIAL LOGOS (White -> Colorful on Hover) */
.creator-socials { display: flex !important; justify-content: center !important; gap: 12px !important; }
.creator-socials a {
    width: 40px !important;
    height: 40px !important;
    border-radius: 50% !important;
    background: rgba(255, 255, 255, 0.03) !important;
    border: 1px solid rgba(255, 255, 255, 0.06) !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    color: #fff !important; /* Default White Logo */
    text-decoration: none !important;
    font-size: 16px !important;
    transition: all 0.3s ease !important;
}

/* Instagram Multi-gradient Color */
.creator-card:hover .social-instagram:hover {
    background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%, #d6249f 60%, #285AEB 90%) !important;
    color: #fff !important;
    border-color: transparent !important;
}

/* YouTube Solid Brand Color */
.creator-card:hover .social-youtube:hover {
    background: #ff0000 !important;
    color: #fff !important;
    border-color: transparent !important;
}

@media(max-width: 768px) {
    .creators-header { flex-direction: column !important; align-items: flex-start !important; gap: 12px !important; height: auto !important; }
    .creators-header h2 { max-width: 100% !important; font-size: 20px !important; }
    .creators-page-container { overflow: visible !important; height: auto !important; }
    .creators-grid-scroll { overflow-y: visible !important; }
}
</style>

                </div>
            </div>

            <div class="creator-card">
                <div class="creator-avatar-wrapper">
                    <img src="https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?q=80&w=200&auto=format&fit=crop" class="creator-avatar" alt="Kabir">
                </div>
                <div class="creator-name">Kabir Verma</div>
                <div class="creator-location"><i class="fa-solid fa-location-dot" style="color: #00e676;"></i> Delhi, India</div>

                <div class="creator-name">Riya Kapoor</div>

        </div>
    </div>
</div>

<script>
// 🎯 HOVER TEXT UPDATE LOGIC
const headingText = document.getElementById('dynamicHeading');
const joinButton = document.getElementById('joinItbBtn');

const hindiHeadingText = "ये सारे creators हैं ITB के पास।";
const englishHoverText = "Join as Creator to build your profile card and directory presence instantly.";

joinButton.addEventListener('mouseenter', () => {
    headingText.style.opacity = '0';
    setTimeout(() => {
        headingText.textContent = englishHoverText;
        headingText.style.fontSize = '15px';
        headingText.style.color = 'rgba(255, 255, 255, 0.6)';
        headingText.style.fontWeight = '500';
        headingText.style.opacity = '1';
    }, 150);
});

joinButton.addEventListener('mouseleave', () => {
    headingText.style.opacity = '0';
    setTimeout(() => {
        headingText.textContent = hindiHeadingText;
        headingText.style.fontSize = '26px';
        headingText.style.color = '#fff';
        headingText.style.fontWeight = '800';
        headingText.style.opacity = '1';
    }, 150);
});
</script>
