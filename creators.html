<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ─── FIXED OVERFLOW & DYNAMIC HEIGHT FLOATING BUTTON ─── */
.floating-cta-trigger {
    position: fixed;
    bottom: 35px;
    right: 35px;
    z-index: 99999;
    height: 56px;   /* Initial State Height */
    width: 56px;    /* Initial State Width */
    background: #010707;
    border: 1px solid rgba(0, 230, 118, 0.4);
    border-radius: 16px;
    display: flex;
    align-items: flex-start; /* Taaki height badhne par icon top pe align rahe */
    justify-content: flex-start;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(0, 230, 118, 0.15);
    /* Transition parameters for ultra smooth growth */
    transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                height 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                border-color 0.3s, box-shadow 0.3s;
}

/* 👑 NO MORE TEXT CUTTING: Hover hone pe height aur width dono smoothly text ke hisab se badhenge */
.floating-cta-trigger:hover {
    width: 380px; 
    height: 140px; /* Safe expanded dynamic height for text block */
    border-color: #00e676;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(0, 230, 118, 0.3);
}

/* Icon Area Styling */
.cta-icon-box {
    width: 54px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.cta-icon-box i {
    font-size: 20px;
    color: #00e676;
}

/* Expanded Text Wrapper Container */
.cta-expanded-content {
    width: 310px;
    padding: 14px 16px 14px 2px; /* Uniform padding inside card */
    opacity: 0;
    visibility: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-sizing: border-box;
    transition: opacity 0.25s ease;
}

/* Hover Content Trigger Logic */
.floating-cta-trigger:hover .cta-expanded-content {
    opacity: 1;
    visibility: visible;
    transition-delay: 0.12s; /* Text tabhi aayega jab box expand ho chuka hoga */
}

.cta-text {
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.95);
    margin: 0;
    font-weight: 500;
    text-align: left;
}

.cta-text span.highlight { 
    color: #00e676; 
    font-weight: 700; 
}

/* Join Now Link Label */
.cta-action-link {
    font-size: 10px;
    font-weight: 800;
    color: #00e676;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    margin-top: 2px;
}
</style>

<div class="floating-cta-trigger" id="google-login-trigger">
    <div class="cta-icon-box">
        <i class="fa-solid fa-id-card"></i> 
    </div>
    <div class="cta-expanded-content">
        <p class="cta-text">
            You can also create your profile card by joining <span class="highlight">iTalentBuddy</span>. Get instant deal notifications directly on your Email or WhatsApp!
        </p>
        <div class="cta-action-link">
            <span>Click to Join with Google</span>
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </div>
    </div>
</div>

<script>
    // Click behavior to trigger dynamic auth wrapper popup sequence
    document.getElementById('google-login-trigger').addEventListener('click', function(e) {
        console.log("Initializing Firebase Auth Routing Flow...");
        window.open('about:blank', '_blank');
    });
</script>
