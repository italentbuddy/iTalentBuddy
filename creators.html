<style>
/* 💎 PREMIUM FLOATING UNROLL WIDGET (Bottom Right) */
.cta-floating-widget {
    position: fixed;
    bottom: 30px;
    right: 30px;
    z-index: 9999; /* Isko sabse upar rakhna hai taaki cards ke peeche na chupe */
    display: flex;
    align-items: center;
    justify-content: center;
    
    /* Initial State: Just a small premium square icon */
    width: 54px;
    height: 54px;
    background: rgba(11, 21, 19, 0.85);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 230, 118, 0.35);
    border-radius: 16px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    
    /* Smooth cubic-bezier transitions */
    transition: width 0.6s cubic-bezier(0.2, 1, 0.2, 1), 
                height 0.6s cubic-bezier(0.2, 1, 0.2, 1), 
                transform 0.4s ease, opacity 0.4s ease, border-radius 0.6s ease;
    
    /* 🔥 CINEMATIC EXPLOSION LOOP (Runs every 20 seconds) */
    animation: premiumBlastLoop 20s infinite ease-in-out;
}

/* Base Icon setup inside the square */
.widget-icon {
    font-size: 18px;
    color: #00e676;
    position: absolute;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Hidden Content Layer initially */
.widget-content {
    display: flex;
    align-items: center;
    justify-content: space-between;
    width: 550px; 
    padding: 0 24px;
    opacity: 0;
    transform: translateX(20px);
    transition: opacity 0.3s ease, transform 0.5s cubic-bezier(0.2, 1, 0.2, 1);
    pointer-events: none;
}

/* ✨ ULTRA PREMIUM HOVER STATE (The Magic Unroll) */
.cta-floating-widget:hover {
    width: 620px; 
    height: 80px;
    border-radius: 20px;
    border-color: rgba(0, 230, 118, 0.7);
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.6), 0 0 25px rgba(0, 230, 118, 0.25);
    background: rgba(8, 18, 16, 0.95);
    animation: none; /* Hover par animation pause ho jayega */
}

.cta-floating-widget:hover .widget-icon {
    opacity: 0;
    transform: scale(0.5) rotate(90deg);
}

.cta-floating-widget:hover .widget-content {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

/* Inner Text Styles */
.cta-text-side {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
}
.cta-text-side h3 {
    margin: 0 0 2px 0;
    font-size: 15px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.2px;
}
.cta-text-side p {
    margin: 0;
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    max-width: 360px;
    line-height: 1.4;
}

/* Premium Button inside Widget */
.cta-btn {
    background: rgba(0, 230, 118, 0.08);
    color: #00e676;
    padding: 10px 18px;
    border: 1px solid rgba(0, 230, 118, 0.4);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 800;
    text-decoration: none;
    white-space: nowrap;
    letter-spacing: 0.5px;
    transition: all 0.3s ease;
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
}
.cta-btn:hover {
    background: #00e676;
    color: #010707;
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.4);
}

/* 💥 KEYFRAME FOR THE BURST / BLAST ANIMATION EFFECT */
@keyframes premiumBlastLoop {
    0%, 92%, 100% {
        transform: scale(1);
        opacity: 1;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        border-color: rgba(0, 230, 118, 0.35);
    }
    94% {
        transform: scale(1.2);
        border-color: rgba(0, 230, 118, 1);
        box-shadow: 0 0 30px rgba(0, 230, 118, 0.8);
        opacity: 1;
    }
    95.5% {
        transform: scale(2.5);
        opacity: 0;
        box-shadow: 0 0 60px rgba(0, 230, 118, 0);
        border-color: rgba(0, 230, 118, 0);
    }
    96.5% {
        transform: scale(0);
        opacity: 0;
    }
    98% {
        transform: scale(1);
        opacity: 1;
    }
}

/* 🔐 COMPULSORY SECURITY MODAL POPUP LAYER */
.login-modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(2, 8, 8, 0.85);
    backdrop-filter: blur(8px);
    z-index: 10000;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    pointer-events: none;
    transition: all 0.4s ease;
}
.login-modal-overlay.active {
    opacity: 1;
    pointer-events: auto;
}
.login-modal-box {
    background: #061110;
    border: 1px solid rgba(255, 255, 255, 0.08);
    box-shadow: 0 20px 50px rgba(0,0,0,0.7);
    border-radius: 24px;
    padding: 32px;
    width: 400px;
    text-align: center;
    position: relative;
    transform: translateY(30px);
    transition: all 0.4s cubic-bezier(0.2, 1, 0.2, 1);
}
.login-modal-overlay.active .login-modal-box {
    transform: translateY(0);
    border-color: rgba(0, 230, 118, 0.3);
}
.modal-close-btn {
    position: absolute;
    top: 16px;
    right: 20px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.4);
    font-size: 20px;
    cursor: pointer;
}
.modal-close-btn:hover { color: #fff; }
.google-login-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #fff;
    color: #000;
    border: none;
    padding: 12px 24px;
    border-radius: 12px;
    font-weight: 700;
    font-size: 14px;
    width: 100%;
    margin-top: 24px;
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(255,255,255,0.1);
    transition: all 0.3s ease;
}
.google-login-btn:hover {
    background: #f1f1f1;
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(0, 230, 118, 0.2);
}
</style>

<div class="cta-floating-widget" id="creatorWidget" style="display: none;">
    <div class="widget-icon" id="widgetIconLayer">
        <i class="fa-solid fa-user-plus" style="font-size: 16px;"></i>
    </div>
    <div class="widget-content">
        <div class="cta-text-side">
            <h3 id="widgetTitleText">Are you a Digital Creator or Influencer?</h3>
            <p>Get listed in India's next-gen ecosystem directory. Show your reach, get direct inquiries and sponsorships.</p>
        </div>
        <button class="cta-btn" onclick="triggerCompulsoryGoogleLogin()" id="widgetMainBtn">
            <i class="fa-solid fa-bolt"></i> <span id="btnDynamicText">JOIN AS CREATOR</span>
        </button>
    </div>
</div>

<div class="login-modal-overlay" id="googleLoginModal">
    <div class="login-modal-box">
        <button class="modal-close-btn" onclick="closeLoginModal()">&times;</button>
        <i class="fa-solid fa-shield-halved" style="font-size: 42px; color: #00e676; margin-bottom: 16px; display:block;"></i>
        <h2 style="color: #fff; font-size: 20px; margin: 0 0 8px 0; font-weight: 700;">Google Authentication</h2>
        <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin: 0; line-height: 1.5;">To create or modify your official ecosystem creator profile page, verify your security identity with Google.</p>
        
        <button class="google-login-btn" onclick="simulateGoogleLoginSuccess()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_res2.png" style="width:18px; height:18px;" />
            Continue with Google
        </button>
    </div>
</div>

<script>
// Backend Auth Simulator Condition
let userHasExistingCreatorAccount = false; 

function checkCreatorAccountStatus() {
    const iconLayer = document.getElementById('widgetIconLayer');
    const titleText = document.getElementById('widgetTitleText');
    const btnText = document.getElementById('btnDynamicText');
    
    if(userHasExistingCreatorAccount) {
        iconLayer.innerHTML = '<i class="fa-solid fa-user-gear" style="font-size: 16px;"></i>';
        titleText.innerText = "Want to update your directory list?";
        btnText.innerText = "EDIT PROFILE";
    } else {
        iconLayer.innerHTML = '<i class="fa-solid fa-user-plus" style="font-size: 16px;"></i>';
        titleText.innerText = "Are you a Digital Creator or Influencer?";
        btnText.innerText = "JOIN AS CREATOR";
    }
}

// 🚀 ROUTER CONTROLLER FOR WIDGET VISIBILITY
function handleWidgetVisibilityBasedOnPage() {
    const currentUrl = window.location.href;
    const widget = document.getElementById('creatorWidget');
    
    // Agar URL me page=creators hai tabhi widget dikhega, warna home page par nahi dikhega
    if(currentUrl.includes('page=creators')) {
        if(widget) widget.style.display = 'flex';
        checkCreatorAccountStatus();
    } else {
        if(widget) widget.style.display = 'none';
    }
}

// Global Triggers for Modal and Auth
function triggerCompulsoryGoogleLogin() {
    document.getElementById('googleLoginModal').classList.add('active');
}

function closeLoginModal() {
    document.getElementById('googleLoginModal').classList.remove('active');
}

function simulateGoogleLoginSuccess() {
    alert("Google Authentication Successful!");
    closeLoginModal();
    
    if(userHasExistingCreatorAccount) {
        alert("Redirecting to profile configuration editor dashboard...");
    } else {
        alert("Verification success! Opening onboarding wizard...");
        userHasExistingCreatorAccount = true;
        checkCreatorAccountStatus();
    }
}

// URL modifications trace hook monitor karne ke liye intervals / listeners
window.addEventListener('popstate', handleWidgetVisibilityBasedOnPage);
window.addEventListener('DOMContentLoaded', handleWidgetVisibilityBasedOnPage);

// Run immediately to trap query params on refresh
setTimeout(handleWidgetVisibilityBasedOnPage, 200);
</script>
