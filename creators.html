<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>
/* ─── GLOBAL SCROLL LOCK (POORA PAGE SCROLL FREEZE) ─── */
html, body {
    overflow: hidden !important;
    height: 100vh !important;
}

#dynamic-wrapper, .wrap {
    height: calc(100vh - 120px) !important;
    overflow: hidden !important;
    padding: 0 !important;
    border: none !important;
}

/* ─── BADA ROUNDED CORNER BOX (SIRF YEH SCROLL HOGA) ─── */
.creators-main-box {
    width: 100%;
    height: 100%;
    background: rgba(4, 16, 16, 0.3);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.04);
    border-radius: 24px;
    padding: 30px 24px;
    overflow-y: auto !important; /* CRITICAL: Sirf cards is box ke andar scroll honge */
    overflow-x: hidden !important;
    box-sizing: border-box;
}

/* Custom Scrollbar Inside Main Box */
.creators-main-box::-webkit-scrollbar {
    width: 6px;
}
.creators-main-box::-webkit-scrollbar-track {
    background: transparent;
}
.creators-main-box::-webkit-scrollbar-thumb {
    background: rgba(0, 230, 118, 0.3);
    border-radius: 10px;
}
.creators-main-box::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 230, 118, 0.5);
}

/* ─── GRID LAYOUT (EXACT 6 CARDS IN ONE ROW) ─── */
.creators-grid {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr)); /* 6 Cards Per Row */
    gap: 24px;
    width: 100%;
    padding: 15px 10px 40px 10px; /* Safe space taaki hover cut na ho */
    box-sizing: border-box;
}

/* ─── CARD DESIGN (9:16 vertical look) ─── */
.creator-card {
    background: rgba(255, 255, 255, 0.015) !important;
    border: 1px solid rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px) !important;
    border-radius: 20px;
    padding: 24px 14px 20px 14px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    aspect-ratio: 9 / 14.5;
    justify-content: space-between;
    transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1), 
                border-color 0.4s, background 0.4s, box-shadow 0.4s;
}

.creator-card:hover {
    border-color: rgba(0, 230, 118, 0.35) !important;
    background: rgba(0, 230, 118, 0.03) !important;
    transform: translateY(-8px);
    box-shadow: 0 15px 35px rgba(0, 230, 118, 0.15);
    z-index: 10;
}

.card-node-info {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
}

.online-dot {
    width: 6px;
    height: 6px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 8px #00e676;
}

.avatar-container {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    border: 1px dashed rgba(0, 230, 118, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 10px 0;
}

.avatar-inner {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.avatar-inner i {
    font-size: 22px;
    color: #00e676;
}

.creator-details {
    text-align: center;
    width: 100%;
}

.creator-name {
    font-size: 18px;
    font-weight: 800;
    color: #fff;
    margin: 0 0 4px 0;
}

.creator-location {
    font-size: 11px;
    color: rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 10px;
}

.creator-location i { color: #00e676; font-size: 10px; }

.creator-tags {
    display: flex;
    gap: 5px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 10px;
}

.tag {
    background: rgba(0, 230, 118, 0.05);
    border: 1px solid rgba(0, 230, 118, 0.15);
    color: #00e676;
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 10px;
    font-weight: 600;
}

.card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 6px;
    width: 100%;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 10px;
}

.stat-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 10px;
    padding: 6px;
    text-align: center;
}

.stat-box i { font-size: 11px; margin-bottom: 3px; }
.stat-box .fa-youtube { color: #ff0000; }
.stat-box .fa-instagram { color: #e1306c; }

.stat-num { font-size: 14px; font-weight: 900; color: #fff; line-height: 1.2; }
.stat-label { font-size: 9px; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); }


/* ─── DYNAMIC EXPANDING FLOATING BUTTON ─── */
.floating-cta-trigger {
    position: fixed;
    bottom: 35px;
    right: 35px;
    z-index: 99999;
    height: 56px;   /* Initial Circle/Box Height */
    width: 56px;    /* Initial Circle/Box Width */
    background: #010707;
    border: 1px solid rgba(0, 230, 118, 0.4);
    border-radius: 16px;
    display: flex;
    align-items: flex-start;
    justify-content: flex-start;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.7), 0 0 15px rgba(0, 230, 118, 0.15);
    transition: width 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                height 0.4s cubic-bezier(0.19, 1, 0.22, 1), 
                border-color 0.3s, box-shadow 0.3s;
}

/* Hover par dynamic expansion bina text kata-fita dikhe */
.floating-cta-trigger:hover {
    width: 380px; 
    height: 140px; /* Safe fixed expansion height to cleanly display wrap text */
    border-color: #00e676;
    box-shadow: 0 15px 40px rgba(0, 0, 0, 0.8), 0 0 25px rgba(0, 230, 118, 0.3);
}

.cta-icon-box {
    width: 54px;
    height: 54px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
}

.cta-icon-box i {
    font-size: 20px;
    color: #00e676;
}

.cta-expanded-content {
    width: 310px;
    padding: 14px 16px 14px 2px;
    opacity: 0;
    visibility: hidden;
    display: flex;
    flex-direction: column;
    gap: 8px;
    box-sizing: border-box;
    transition: opacity 0.25s ease;
}

.floating-cta-trigger:hover .cta-expanded-content {
    opacity: 1;
    visibility: visible;
    transition-delay: 0.12s;
}

.cta-text {
    font-size: 12px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.95);
    margin: 0;
    font-weight: 500;
    text-align: left;
}

.cta-text span.highlight { 
    color: #00e676; 
    font-weight: 700; 
}

.cta-action-link {
    font-size: 10px;
    font-weight: 800;
    color: #00e676;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.5px;
    margin-top: 2px;
}
</style>

<div class="creators-main-box">
    <div class="creators-grid">
        
        <div class="creator-card">
            <div class="card-node-info">
                <span>Node // SEC_01</span>
                <div class="online-dot"></div>
            </div>
            <div class="avatar-container">
                <div class="avatar-inner">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            <div class="creator-details">
                <div class="creator-name">Ikla Pikla</div>
                <div class="creator-location"><i class="fa-solid fa-location-dot"></i> Uttar Pradesh</div>
                <div class="creator-tags">
                    <span class="tag">Gaming</span>
                    <span class="tag">Music</span>
                </div>
            </div>
            <div class="card-stats">
                <div class="stat-box">
                    <i class="fa-brands fa-youtube"></i>
                    <div class="stat-num">1K</div>
                    <div class="stat-label">Subs</div>
                </div>
                <div class="stat-box">
                    <i class="fa-brands fa-instagram"></i>
                    <div class="stat-num">2K</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>
        </div>

    </div>
</div>

<div class="floating-cta-trigger" id="google-login-trigger">
    <div class="cta-icon-box">
        <i class="fa-solid fa-id-card"></i> 
    </div>
    <div class="cta-expanded-content">
        <p class="cta-text">
            You can also create your profile card by joining <span class="highlight">iTalentBuddy</span>. Get instant deal notifications directly on your Email or WhatsApp!
        </p>
        <div class="cta-action-link">
            <span>Click to Join with Google</span>
            <i class="fa-solid fa-arrow-right-to-bracket"></i>
        </div>
    </div>
</div>

<script>
    // EXACTLY TOTAL 18 CARDS GENERATION (1 Row me 6 Cards, Total 3 Rows layout)
    const targetGrid = document.querySelector('.creators-grid');
    const blueprintMarkup = `
    <div class="creator-card">
        <div class="card-node-info">
            <span>Node // SEC_02</span>
            <div class="online-dot"></div>
        </div>
        <div class="avatar-container">
            <div class="avatar-inner">
                <i class="fa-solid fa-user"></i>
            </div>
        </div>
        <div class="creator-details">
            <div class="creator-name">Alpha Creator</div>
            <div class="creator-location"><i class="fa-solid fa-location-dot"></i> New Delhi</div>
            <div class="creator-tags">
                <span class="tag">Vlogs</span>
                <span class="tag">Tech</span>
            </div>
        </div>
        <div class="card-stats">
            <div class="stat-box">
                <i class="fa-brands fa-youtube"></i>
                <div class="stat-num">45K</div>
                <div class="stat-label">Subs</div>
            </div>
            <div class="stat-box">
                <i class="fa-brands fa-instagram"></i>
                <div class="stat-num">120K</div>
                <div class="stat-label">Followers</div>
            </div>
        </div>
    </div>`;

    // 1st Card HTML me h, bache hue 17 loop elements compile honge total 18 grid space banane ke liye
    for (let i = 0; i < 17; i++) {
        targetGrid.insertAdjacentHTML('beforeend', blueprintMarkup);
    }

    // Connect trigger button routing function setup
    document.getElementById('google-login-trigger').addEventListener('click', function() {
        console.log("Redirecting to Google Login Pop-up container workflow...");
        window.open('about:blank', '_blank');
    });
</script>
