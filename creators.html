<script>
// 📧 AUTO-FILL EMAIL FROM AUTH LOCAL STORAGE
const authEmail = localStorage.getItem('userEmail') || "creator@italentbuddy.com"; 
document.getElementById('email').value = authEmail;

// 🖼️ PHOTO UPLOAD VALIDATION (1MB LIMIT + IMAGE FORMAT STRICT CHECK)
const fileInput = document.getElementById('profileInput');
const previewImg = document.getElementById('previewImg');
const placeholder = document.getElementById('placeholder');

fileInput.onchange = function() {
    const file = this.files[0];
    if (file) {
        // Strict Type Check
        if (!file.type.startsWith('image/')) {
            alert("Invalid format! Please upload an image file only (PNG, JPG, WEBP).");
            this.value = "";
            return;
        }
        // 1MB Size Check
        if (file.size > 1024 * 1024) {
            alert("File is too large! Maximum limit is 1MB.");
            this.value = "";
            return;
        }
        const reader = new FileReader();
        reader.onload = function(e) {
            previewImg.src = e.target.result;
            previewImg.style.display = 'block';
            placeholder.style.display = 'none';
        }
        reader.readAsDataURL(file);
    }
};

// 🏷️ MULTI-SELECT CATEGORY DROPDOWN TOGGLE LOGIC
function toggleCategoryDropdown() {
    const list = document.getElementById('dropList');
    list.style.display = (list.style.display === 'block') ? 'none' : 'block';
}

// Window click helper to close dropdown when clicked outside
window.addEventListener('click', function(e) {
    if (!document.getElementById('dropHeader').contains(e.target) && !document.getElementById('dropList').contains(e.target)) {
        document.getElementById('dropList').style.display = 'none';
    }
});

let selectedCats = [];
function updateSelectedCategories() {
    const checkboxes = document.querySelectorAll('#dropList input[type="checkbox"]');
    selectedCats = [];
    checkboxes.forEach(cb => {
        if (cb.checked) selectedCats.push(cb.value);
    });
    
    const headerText = document.getElementById('dropSelectedText');
    if (selectedCats.length > 0) {
        headerText.textContent = selectedCats.join(', ');
        headerText.style.color = '#00e676';
    } else {
        headerText.textContent = "Select Categories...";
        headerText.style.color = 'rgba(255, 255, 255, 0.7)';
    }
}

// 💾 SAVE SYSTEM 
function saveCreatorData() {
    const btn = document.getElementById('saveProfileBtn');
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> GENERATING CARD...';
    btn.disabled = true;

    // Data package object
    const finalData = {
        realName: document.getElementById('realName').value,
        asaName: document.getElementById('asaName').value,
        phone: document.getElementById('phone').value,
        email: document.getElementById('email').value,
        state: document.getElementById('state').value,
        gender: document.getElementById('gender').value,
        categories: selectedCats,
        socials: {
            youtube: { url: document.getElementById('ytLink').value, range: document.getElementById('ytRange').value },
            instagram: { url: document.getElementById('igLink').value, range: document.getElementById('igRange').value },
            facebook: { url: document.getElementById('fbLink').value, range: document.getElementById('fbRange').value },
            threads: { url: document.getElementById('thLink').value, range: document.getElementById('thRange').value },
            x: { url: document.getElementById('xLink').value, range: document.getElementById('xRange').value },
            snapchat: { url: document.getElementById('scLink').value, range: document.getElementById('scRange').value }
        }
    };

    console.log("Pushing Data to Firebase Architecture:", finalData);

    setTimeout(() => {
        alert("Your Premium Creator Card is Live!");
        window.location.href = "index.html?page=creators";
    }, 1600);
}

// Dynamic injection of India States List
const indianStates = [
    "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", 
    "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", 
    "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", 
    "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Delhi", "Jammu and Kashmir", "Ladakh"
];
const stateDropdown = document.getElementById('state');
indianStates.forEach(st => {
    let opt = document.createElement('option');
    opt.value = st;
    opt.innerHTML = st;
    stateDropdown.appendChild(opt);
});
</script>
