<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

<style>
/* ─── MAIN CONTAINER (Bada Rounded Corner Box ke andar ka main area) ─── */
.creators-page-container {
    width: 100%;
    height: 100%;
    position: relative;
    display: block;
}

/* ─── CARDS SCROLLABLE GRID (1 Line me 6 Cards, Total 24 Cards) ─── */
.creators-grid {
    width: 100%;
    height: 100%;
    overflow-y: auto;
    padding: 24px;
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr)); /* Exact 6 cards per row */
    gap: 20px;
    scroll-behavior: smooth;
}

/* Custom Scrollbar Inside the Main Box */
.creators-grid::-webkit-scrollbar {
    width: 6px;
}
.creators-grid::-webkit-scrollbar-track {
    background: transparent;
}
.creators-grid::-webkit-scrollbar-thumb {
    background: rgba(0, 230, 118, 0.2);
    border-radius: 10px;
}
.creators-grid::-webkit-scrollbar-thumb:hover {
    background: rgba(0, 230, 118, 0.4);
}

/* ─── CREATOR CARD DESIGN (Perfect 9:16 vertical look) ─── */
.creator-card {
    background: rgba(255, 255, 255, 0.015) !important;
    border: 1px solid rgba(255, 255, 255, 0.03) !important;
    backdrop-filter: blur(10px) !important;
    border-radius: 20px;
    padding: 24px 16px 20px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    position: relative;
    aspect-ratio: 9 / 14; /* Standard proportional vertical aspect-ratio */
    justify-content: space-between;
    transition: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
}

.creator-card:hover {
    border-color: rgba(0, 230, 118, 0.3) !important;
    background: rgba(0, 230, 118, 0.02) !important;
    transform: translateY(-5px);
    box-shadow: 0 12px 30px rgba(0, 230, 118, 0.1);
}

/* Card Header Nodes */
.card-node-info {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 1px;
    color: rgba(255, 255, 255, 0.3);
    text-transform: uppercase;
}

.online-dot {
    width: 6px;
    height: 6px;
    background: #00e676;
    border-radius: 50%;
    box-shadow: 0 0 8px #00e676;
}

/* Avatar Layout */
.avatar-container {
    width: 85px;
    height: 85px;
    border-radius: 50%;
    border: 1px dashed rgba(0, 230, 118, 0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 15px 0 10px 0;
}

.avatar-inner {
    width: 73px;
    height: 73px;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px solid rgba(255, 255, 255, 0.05);
}

.avatar-inner i {
    font-size: 28px;
    color: #00e676;
}

/* Identity Details */
.creator-details {
    text-align: center;
    width: 100%;
}

.creator-name {
    font-size: 19px;
    font-weight: 800;
    color: #fff;
    margin: 0 0 4px 0;
    letter-spacing: -0.5px;
}

.creator-location {
    font-size: 12px;
    color: rgba(255, 255, 255, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 4px;
    margin-bottom: 12px;
}

.creator-location i {
    color: #00e676;
    font-size: 11px;
}

.creator-tags {
    display: flex;
    gap: 6px;
    justify-content: center;
    flex-wrap: wrap;
    margin-bottom: 15px;
}

.tag {
    background: rgba(0, 230, 118, 0.05);
    border: 1px solid rgba(0, 230, 118, 0.15);
    color: #00e676;
    padding: 4px 10px;
    border-radius: 8px;
    font-size: 11px;
    font-weight: 600;
}

/* Stats Footer Grid inside Card */
.card-stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    width: 100%;
    margin-top: auto;
    border-top: 1px solid rgba(255, 255, 255, 0.05);
    padding-top: 12px;
}

.stat-box {
    background: rgba(255, 255, 255, 0.02);
    border: 1px solid rgba(255, 255, 255, 0.03);
    border-radius: 12px;
    padding: 8px;
    text-align: center;
}

.stat-box i { font-size: 12px; margin-bottom: 4px; }
.stat-box .fa-youtube { color: #ff0000; }
.stat-box .fa-instagram { color: #e1306c; }

.stat-num { font-size: 15px; font-weight: 900; color: #fff; line-height: 1.2; }
.stat-label { font-size: 9px; text-transform: uppercase; color: rgba(255, 255, 255, 0.4); margin-top: 1px; }

/* ─── FLOATING CTA ACTION BUTTON (Bottom Right Corner) ─── */
.floating-join-card {
    position: absolute;
    bottom: 25px;
    right: 25px;
    z-index: 99;
    max-width: 320px;
    background: rgba(4, 18, 18, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(0, 230, 118, 0.3);
    padding: 18px;
    border-radius: 16px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 230, 118, 0.1);
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

/* Hover dynamic micro-interactions (Button bada aur bright hoga) */
.floating-join-card:hover {
    transform: scale(1.05) translateY(-5px);
    border-color: #00e676;
    box-shadow: 0 15px 45px rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 230, 118, 0.25);
}

.floating-content {
    display: flex;
    flex-direction: column;
    gap: 8px;
}

.floating-text {
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255, 255, 255, 0.85);
    font-weight: 500;
    margin: 0;
}

.floating-text strong {
    color: #fff;
    font-weight: 700;
}

.floating-text .highlight-green {
    color: #00e676;
    font-weight: 700;
}

.floating-btn-action {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 4px;
    font-size: 12px;
    font-weight: 800;
    color: #00e676;
    text-transform: uppercase;
    letter-spacing: 0.5px;
}

.floating-btn-action i {
    transition: transform 0.3s ease;
}

.floating-join-card:hover .floating-btn-action i {
    transform: translateX(5px);
}

/* ─── RESPONSIVE CONFIGURATIONS ─── */
@media(max-width: 1400px) {
    .creators-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); }
}
@media(max-width: 1024px) {
    .creators-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .floating-join-card { max-width: 280px; bottom: 15px; right: 15px; padding: 14px; }
}
@media(max-width: 600px) {
    .creators-grid { grid-template-columns: 1fr; padding: 15px; }
    .floating-join-card { position: fixed; bottom: 20px; left: 20px; right: 20px; max-width: none; }
}
</style>

<div class="creators-page-container">

    <div class="creators-grid">
        
        <div class="creator-card">
            <div class="card-node-info">
                <span>Node // SEC_01</span>
                <div class="online-dot"></div>
            </div>
            <div class="avatar-container">
                <div class="avatar-inner">
                    <i class="fa-solid fa-user"></i>
                </div>
            </div>
            <div class="creator-details">
                <div class="creator-name">Ikla Pikla</div>
                <div class="creator-location"><i class="fa-solid fa-location-dot"></i> Uttar Pradesh</div>
                <div class="creator-tags">
                    <span class="tag">Gaming</span>
                    <span class="tag">Entertainment</span>
                </div>
            </div>
            <div class="card-stats">
                <div class="stat-box">
                    <i class="fa-brands fa-youtube"></i>
                    <div class="stat-num">1K</div>
                    <div class="stat-label">Subs</div>
                </div>
                <div class="stat-box">
                    <i class="fa-brands fa-instagram"></i>
                    <div class="stat-num">2K</div>
                    <div class="stat-label">Followers</div>
                </div>
            </div>
        </div>

        <script>
            const containerGrid = document.querySelector('.creators-grid');
            const placeholderCard = `
            <div class="creator-card">
                <div class="card-node-info">
                    <span>Node // SEC_02</span>
                    <div class="online-dot"></div>
                </div>
                <div class="avatar-container">
                    <div class="avatar-inner">
                        <i class="fa-solid fa-user"></i>
                    </div>
                </div>
                <div class="creator-details">
                    <div class="creator-name">Alpha Creator</div>
                    <div class="creator-location"><i class="fa-solid fa-location-dot"></i> New Delhi</div>
                    <div class="creator-tags">
                        <span class="tag">Vlogs</span>
                        <span class="tag">Tech</span>
                    </div>
                </div>
                <div class="card-stats">
                    <div class="stat-box">
                        <i class="fa-brands fa-youtube"></i>
                        <div class="stat-num">45K</div>
                        <div class="stat-label">Subs</div>
                    </div>
                    <div class="stat-box">
                        <i class="fa-brands fa-instagram"></i>
                        <div class="stat-num">120K</div>
                        <div class="stat-label">Followers</div>
                    </div>
                </div>
            </div>`;
            
            // 23 more cards added dynamically to form a perfect 6x4 layout grid
            for(let i = 0; i < 23; i++) {
                containerGrid.insertAdjacentHTML('beforeend', placeholderCard);
            }
        </script>

    </div>

    <div class="floating-join-card" id="floating-join-box">
        <div class="floating-content">
            <p class="floating-text">
                You can also <strong>create your profile card</strong> by joining <span class="highlight-green">iTalentBuddy</span>. Get instant deal notifications directly on your <strong>Email or WhatsApp</strong>!
            </p>
            <div class="floating-btn-action">
                <span>Join Now & Create Card</span>
                <i class="fa-solid fa-arrow-right"></i>
            </div>
        </div>
    </div>

</div>
