/* Green Theme Hover Effect for Standard Cards */

    box-shadow: 0 10px 30px rgba(0, 230, 118, 0.1) !important;

/* 🚺 FEMALE CARD CONFIG (Pink Border & Subtle Glow) */

}

    box-shadow: 0 10px 30px rgba(255, 105, 180, 0.15) !important;
}

/* CARD INNER ELEMENTS */
.creator-avatar-wrapper {
    width: 100px !important;
    height: 100px !important;
    margin: 0 auto 14px auto !important;
    position: relative !important;
}

.creator-avatar {
    width: 100% !important;
    height: 100% !important;
    border-radius: 50% !important;
    object-fit: cover !important;
    border: 2px solid rgba(255, 255, 255, 0.1) !important;
}
.creator-card:hover .creator-avatar {
    border-color: #00e676 !important;
}
.creator-card.female-card:hover .creator-avatar {

}

.creator-name {
    font-size: 18px !important;
    font-weight: 700 !important;
    margin: 0 0 4px 0 !important;
    color: #fff !important;
}

.creator-location {
    font-size: 12px !important;
    color: #b0c0c0 !important;
    margin: 0 0 16px 0 !important;
    display: flex !important;
    align-items: center !important;
    justify-content: center !important;
    gap: 4px !important;
}

/* 🌐 SOCIAL LINKS (White Logos -> Colorful on Hover) */
.creator-socials {
    display: flex !important;

}

.creator-socials a {
    width: 38px !important;

    justify-content: center !important;

/* Dynamic Brand Colors on Card Hover */
.creator-card:hover .social-instagram:hover {

    border-color: transparent !important;
}

.creator-card:hover .social-youtube:hover {

/* RESPONSIVE BREAKPOINT */
@media(max-width: 768px) {
    .creators-header {
        flex-direction: column !important;
        align-items: flex-start !important;

    .creators-header h2 { max-width: 100% !important; font-size: 22px !important; }
    .creators-grid-scroll { overflow-y: visible !important; }

<script>
// 🎯 INTERACTIVE HOVER INTERFACE ROUTE
const headingElement = document.getElementById('dynamicHeading');
const joinBtnElement = document.getElementById('joinItbBtn');

const defaultHindiText = "ये सारे creators हैं ITB के पास।";
const hoverEnglishText = "You can join ITB as a content creator or influencer, and your card will show up below.";

joinBtnElement.addEventListener('mouseenter', () => {
    headingElement.style.opacity = '0';
    setTimeout(() => {
        headingElement.textContent = hoverEnglishText;
        headingElement.style.fontSize = '18px';
        headingElement.style.color = '#cbdad1';
        headingElement.style.fontWeight = '500';
        headingElement.style.opacity = '1';
    }, 150);
});

joinBtnElement.addEventListener('mouseleave', () => {
    headingElement.style.opacity = '0';
    setTimeout(() => {
        headingElement.textContent = defaultHindiText;
        headingElement.style.fontSize = '28px';
        headingElement.style.color = '#fff';
        headingElement.style.fontWeight = '800';
        headingElement.style.opacity = '1';
    }, 150);
});

// 🔐 FIREBASE AUTH INTEGRATION WITH FAILSAFE REDIRECTS
function handleCreatorLoginWorkflow() {
    // index.html में पहले से इम्पोर्टेड ग्लोबल 'window.triggerGmailVerificationWorkflow' को कॉल करता है
    if (typeof window.triggerGmailVerificationWorkflow === 'function') {
        window.triggerGmailVerificationWorkflow();
    } else {
        // Fallback सुरक्षा प्रबंधन अगर पैरेंट स्क्रिप्ट लोड न हुई हो
        console.warn("Firebase Auth workflow initiated manually from inner component scope.");
        alert("Authentication engine is initializing... Please click again in a brief second.");
    }
}
</script>
