<div class="cta-floating-widget state-join" id="creatorWidget" style="display: none;">
    <div class="widget-icon" id="widgetIconLayer">
        <i class="fa-solid fa-user-plus"></i>
    </div>
    
    <div class="widget-content" id="widgetLayoutLoggedOut" style="display: none;">
        <div class="cta-text-side">
            <h3>Are you a Digital Creator?</h3>
            <p>Join India's next-gen ecosystem directory setup.</p>
        </div>
        <button class="cta-btn" onclick="openLoginModal()">JOIN NOW</button>
    </div>

    <div class="widget-content" id="widgetLayoutNoProfile" style="display: none;">
        <div class="cta-text-side">
            <h3>Welcome, Setup Profile!</h3>
            <p>Complete your live platform listing data now.</p>
        </div>
        <button class="cta-btn" onclick="redirectToForm('new')">CREATE NOW</button>
    </div>

    <div class="widget-content" id="widgetLayoutHasProfile" style="display: none;">
        <div class="cta-text-side">
            <h3>Profile Dashboard</h3>
        </div>
        <button class="cta-btn" onclick="redirectToForm('edit')">EDIT PROFILE</button>
    </div>
</div>

<div class="login-modal-overlay" id="googleLoginModal">
    <div class="login-modal-box">
        <span class="close-modal-x" onclick="closeLoginModal()">&times;</span>
        <h2 style="color: #fff; font-size: 19px; margin: 10px 0 8px 0; font-family: system-ui, -apple-system, sans-serif;">Google Authentication</h2>
        <p style="color: rgba(255,255,255,0.6); font-size: 13px; margin-bottom: 20px; font-family: system-ui, -apple-system, sans-serif;">Please verify your identity to continue to the platform directory setup.</p>
        <button class="google-login-btn" onclick="executeActualFirebaseLogin()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/copy_res2.png" style="width:18px; height:18px;" alt="Google" />
            Continue with Google
        </button>
    </div>
</div>

<style>
.cta-floating-widget, .cta-floating-widget * {
    box-sizing: border-box;
    font-family: system-ui, -apple-system, sans-serif;
}
.cta-floating-widget {
    position: fixed !important;
    bottom: 30px !important;
    right: 30px !important;
    z-index: 99999 !important;
    display: none; 
    align-items: center;
    justify-content: center;
    width: 54px;
    height: 54px;
    background: rgba(11, 21, 19, 0.96);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(0, 230, 118, 0.35);
    border-radius: 16px;
    cursor: pointer;
    overflow: hidden;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6);
    transition: width 0.4s cubic-bezier(0.2, 1, 0.2, 1), 
                height 0.4s cubic-bezier(0.2, 1, 0.2, 1), 
                transform 0.3s ease, opacity 0.3s ease;
    animation: premiumWidgetBlast 20s infinite ease-in-out;
}

/* Hover Configurations for safe width adjustments */
.cta-floating-widget.state-join:hover {
    width: 580px; 
    height: 80px;
    border-radius: 20px;
    animation: none;
}
.cta-floating-widget.state-edit:hover {
    width: 250px; 
    height: 65px;
    border-radius: 14px;
    animation: none;
}

.widget-icon {
    font-size: 18px;
    color: #00e676;
    position: absolute;
    transition: all 0.3s ease;
}
.cta-floating-widget:hover .widget-icon {
    opacity: 0;
    transform: scale(0.5) rotate(90deg);
}

.widget-content {
    align-items: center;
    justify-content: space-between;
    width: 100%;
    padding: 0 20px;
    opacity: 0;
    transform: translateX(10px);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
}
.cta-floating-widget:hover .widget-content {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
}

.cta-text-side {
    display: flex;
    flex-direction: column;
    justify-content: center;
    text-align: left;
}
.cta-text-side h3 { margin: 0; font-size: 14px; font-weight: 700; color: #fff; }
.cta-text-side p { margin: 3px 0 0 0; font-size: 11px; color: rgba(255, 255, 255, 0.5); max-width: 340px; }

.cta-btn {
    background: rgba(0, 230, 118, 0.08);
    color: #00e676;
    padding: 10px 16px;
    border: 1px solid rgba(0, 230, 118, 0.4);
    border-radius: 10px;
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.3s ease;
}
.cta-btn:hover { background: #00e676; color: #010707; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }

@keyframes premiumWidgetBlast {
    0%, 93%, 100% { transform: scale(1); opacity: 1; }
    95% { transform: scale(1.15); border-color: rgba(0, 230, 118, 1); box-shadow: 0 0 25px rgba(0, 230, 118, 0.6); }
    96.5% { transform: scale(2.2); opacity: 0; }
    97.5% { transform: scale(0); opacity: 0; }
    99% { transform: scale(1); opacity: 1; }
}

/* MODAL CONTAINER BOX DIMENSIONS */
.login-modal-overlay {
    position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important;
    background: rgba(2, 8, 8, 0.85); backdrop-filter: blur(8px);
    z-index: 999999 !important; display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none; transition: all 0.3s ease;
}
.login-modal-overlay.active { opacity: 1; pointer-events: auto; }
.login-modal-box {
    background: #061110; border: 1px solid rgba(0, 230, 118, 0.2);
    border-radius: 24px; padding: 32px; width: 380px; text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5);
}
.google-login-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    background: #fff; color: #000; border: none; padding: 12px 24px;
    border-radius: 12px; font-weight: 700; width: 100%; cursor: pointer; transition: background 0.2s;
}
.google-login-btn:hover { background: #f1f1f1; }
.close-modal-x { float: right; cursor: pointer; color: #aaa; font-size: 20px; margin-top: -10px; }
</style>

<script>
function runRouterWidgetTracker() {
    const urlParams = new URLSearchParams(window.location.search);
    const isCreatorsPage = urlParams.get('page') === 'creators' || window.location.href.includes('page=creators');
    const widget = document.getElementById('creatorWidget');

    if (widget) {
        if (isCreatorsPage) {
            widget.style.display = 'flex';
            evaluateEcosystemState();
        } else {
            widget.style.display = 'none';
        }
    }
}

function evaluateEcosystemState() {
    const widget = document.getElementById('creatorWidget');
    const iconLayer = document.getElementById('widgetIconLayer');
    
    // Fetching the layout containers safely
    const layoutLoggedOut = document.getElementById('widgetLayoutLoggedOut');
    const layoutNoProfile = document.getElementById('widgetLayoutNoProfile');
    const layoutHasProfile = document.getElementById('widgetLayoutHasProfile');
    
    if (!widget || !layoutLoggedOut || !layoutNoProfile || !layoutHasProfile) return;

    // Reset visibility of all layouts first to prevent overlaps
    layoutLoggedOut.style.display = 'none';
    layoutNoProfile.style.display = 'none';
    layoutHasProfile.style.display = 'none';

    if (typeof firebase !== 'undefined' && firebase.auth) {
        const activeUser = firebase.auth().currentUser;

        if (!activeUser) {
            // RULE 2: User is Logged Out
            widget.className = "cta-floating-widget state-join";
            if (iconLayer) iconLayer.innerHTML = '<i class="fa-solid fa-user-plus"></i>';
            layoutLoggedOut.style.display = 'flex';
        } else {
            // Check Firestore tracking records safely
            firebase.firestore().collection("creators").doc(activeUser.uid).get()
            .then((doc) => {
                if (doc.exists) {
                    // RULE 3: Logged In + Has Profile active
                    widget.className = "cta-floating-widget state-edit";
                    if (iconLayer) iconLayer.innerHTML = '<i class="fa-solid fa-user-gear"></i>';
                    layoutHasProfile.style.display = 'flex';
                } else {
                    // RULE 1: Logged In but No Profile found
                    widget.className = "cta-floating-widget state-join";
                    if (iconLayer) iconLayer.innerHTML = '<i class="fa-solid fa-user-plus"></i>';
                    layoutNoProfile.style.display = 'flex';
                }
            }).catch((err) => { console.error("Firestore balance sync failed: ", err); });
        }
    }
}

function executeActualFirebaseLogin() {
    if (typeof firebase !== 'undefined' && firebase.auth) {
        const provider = new firebase.auth.GoogleAuthProvider();
        firebase.auth().signInWithPopup(provider)
        .then(() => {
            closeLoginModal();
            evaluateEcosystemState();
        })
        .catch((error) => { alert("Google Auth Error: " + error.message); });
    }
}

function redirectToForm(mode) {
    if (typeof firebase !== 'undefined' && firebase.auth) {
        const user = firebase.auth().currentUser;
        if (user) { window.location.href = `onboarding.html?mode=${mode}&uid=${user.uid}`; }
    }
}

function openLoginModal() { document.getElementById('googleLoginModal').classList.add('active'); }
function closeLoginModal() { document.getElementById('googleLoginModal').classList.remove('active'); }

// Trigger events trackers initialization securely
if (typeof firebase !== 'undefined' && firebase.auth) {
    firebase.auth().onAuthStateChanged(() => { runRouterWidgetTracker(); });
}
window.addEventListener('popstate', runRouterWidgetTracker);
setInterval(runRouterWidgetTracker, 1500); 
</script>
