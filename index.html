<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTalentBuddy | Next-Gen Creator Ecosystem</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 🎨 GLOBAL PREMIUM DARK THEME STYLES */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background-color: #010707;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            padding: 24px;
        }
        
        /* 🧭 NAVIGATION HEADER */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            max-width: 1400px;
            margin: 0 auto 32px auto;
            padding: 0 10px;
        }
        .logo {
            font-size: 24px;
            font-weight: 800;
            color: #fff;
        }
        .logo span {
            color: #00e676;
        }
        nav {
            display: flex;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .nav-btn {
            background: transparent;
            color: rgba(255, 255, 255, 0.6);
            border: none;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }
        .nav-btn.active {
            background: #00e676;
            color: #010707;
            box-shadow: 0 0 15px rgba(0, 230, 118, 0.4);
        }

        /* 📦 DYNAMIC CONTENT SEAT */
        #dynamic-wrapper {
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
            min-height: 60vh;
        }

        /* 🔒 FLOATING AUTH STATE SIMULATOR (FOR TESTING ONLY) */
        .auth-simulator-badge {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: rgba(4, 16, 16, 0.85);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 12px;
            border-radius: 12px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">iTalent<span>Buddy</span></div>
        <nav>
            <button class="nav-btn" onclick="navigateToPage('home')">Home</button>
            <button class="nav-btn" onclick="navigateToPage('creators')">Creators</button>
            <button class="nav-btn" onclick="navigateToPage('deals')">Deals</button>
            <button class="nav-btn" onclick="navigateToPage('agencies')">Agencies</button>
            <button class="nav-btn" onclick="navigateToPage('production-houses')">Production Houses</button>
        </nav>
    </header>

    <main id="dynamic-wrapper">
        </main>

    <div class="auth-simulator-badge">
        <div id="authStatusText" style="font-size: 11px; font-weight: bold; color: #ff5252;">🛑 Status: Logged Out</div>
        <div style="display: flex; gap: 5px;">
            <button onclick="simulateLoginState(true)" style="padding:4px 8px; font-size:10px; cursor:pointer; background:#00e676; border:none; border-radius:4px; font-weight:bold;">Login</button>
            <button onclick="simulateLoginState(false)" style="padding:4px 8px; font-size:10px; cursor:pointer; background:#ff5252; border:none; border-radius:4px; font-weight:bold; color:white;">Logout</button>
        </div>
    </div>

    <script>
        // =========================================================================
        // 🛠️ 1. CENTRALIZED ROUTE GUARD SECURITY MATRIX
        // =========================================================================
        const routeConfiguration = {
            'home': { requireAuth: false },
            'deals': { requireAuth: false },
            'agencies': { requireAuth: false },
            'production-houses': { requireAuth: false },
            
            // Creators Page Engine Settings
            'creators': { 
                requireAuth: false, 
                protectedActionBtnId: 'gatekeeperCreatorBtn', // Is ID wale button ko monitor karega
                targetUrl: 'onboarding.html',                 // True hone par kahan bhejna hai
                alertMsg: '⚠️ Please login first to register as a Creator on iTalentBuddy!'
            }
            
            /* 未来 Future Expansion: Agar kisi naye page par security lagani ho toh bas yahan 1 entry karni hai:
            'deals': {
                requireAuth: false,
                protectedActionBtnId: 'claimDealBtn',
                targetUrl: 'claim.html',
                alertMsg: '⚠️ Deals claim karne ke liye login karein!'
            } 
            */
        };

        // =========================================================================
        // 🚀 2. ROUTER & GATEKEEPER ENGINE (ALIVE FOR ALL PAGES)
        // =========================================================================
        function navigateToPage(pageName) {
            // Active Tab Class Switcher
            const buttons = document.querySelectorAll('.nav-btn');
            buttons.forEach(btn => {
                if(btn.innerText.toLowerCase() === pageName.replace('-', ' ').toLowerCase()) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // Browser URL state sync update without reload
            const newUrl = window.location.protocol + "//" + window.location.host + window.location.pathname + '?page=' + pageName;
            window.history.pushState({path:newUrl}, '', newUrl);

            // Fetch dynamic template view safely bypassing browser cache
            fetch(`${pageName}.html?cacheBuster=${Date.now()}`)
                .then(res => {
                    if(!res.ok) throw new Error("Component view layout missing");
                    return res.text();
                })
                .then(htmlMarkup => {
                    const viewContainer = document.getElementById('dynamic-wrapper');
                    if (!viewContainer) return;

                    // Layout code insert karo
                    viewContainer.innerHTML = htmlMarkup;

                    // ⚡ AUTOPILOT GATEKEEPER SCANNING ACTIVATED
                    const pageConfig = routeConfiguration[pageName];
                    if (pageConfig && pageConfig.protectedActionBtnId) {
                        
                        // Safe check for element rendering window execution delay
                        setTimeout(() => {
                            const targetActionBtn = document.getElementById(pageConfig.protectedActionBtnId);
                            if (targetActionBtn) {
                                // Event duplication listeners fix reset via cloning
                                const secureBtnClone = targetActionBtn.cloneNode(true);
                                targetActionBtn.parentNode.replaceChild(secureBtnClone, targetActionBtn);

                                // Bind secure functionality
                                secureBtnClone.addEventListener('click', function() {
                                    // Live Authentication check across standard variables (Firebase / Storage)
                                    const userTokenActive = localStorage.getItem('currentUser') || localStorage.getItem('user') || window.currentUser;

                                    if (userTokenActive) {
                                        // Clear logic validation: Verified! Open targeted onboarding window.
                                        window.location.href = pageConfig.targetUrl;
                                    } else {
                                        // Access Denied: Block workflow and open portal gate popup
                                        alert(pageConfig.alertMsg);
                                        if (typeof toggleAuthModal === 'function') {
                                            toggleAuthModal(); // Custom login pop-up runner
                                        } else {
                                            console.log("Diverting user to fallback identity provider endpoint");
                                            // Fallback redirection logic context if no custom pop-up exists
                                        }
                                    }
                                });
                            }
                        }, 60);
                    }

                    // 🟢 COMPONENT EXTENSION INJECTOR: Creators Matrix renderer executor
                    if (pageName === 'creators' && typeof initCreatorsMatrixData === 'function') {
                        initCreatorsMatrixData();
                    }
                })
                .catch(err => {
                    console.error("View Router Error:", err);
                    document.getElementById('dynamic-wrapper').innerHTML = `
                        <div style="text-align:center; padding:100px 0; color:rgba(255,255,255,0.3);">
                            <i class="fa-solid fa-circle-exclamation" style="font-size:48px; margin-bottom:16px; color:#ff5252;"></i>
                            <h2>${pageName}.html file is missing or failed to stream code layout.</h2>
                        </div>`;
                });
        }

        // =========================================================================
        // 🔐 3. AUTH STATE UTILITY WORKFLOWS (For testing login/logout state)
        // =========================================================================
        function simulateLoginState(isLogged) {
            if(isLogged) {
                localStorage.setItem('currentUser', JSON.stringify({uid: "itb_tester_99", name: "Demo User"}));
                document.getElementById('authStatusText').innerText = "✅ Status: Logged In";
                document.getElementById('authStatusText').style.color = "#00e676";
            } else {
                localStorage.removeItem('currentUser');
                localStorage.removeItem('user');
                window.currentUser = null;
                document.getElementById('authStatusText').innerText = "🛑 Status: Logged Out";
                document.getElementById('authStatusText').style.color = "#ff5252";
            }
        }

        // =========================================================================
        // 🏁 4. APP INITIALIZATION (AUTO START ON PAGE LOAD)
        // =========================================================================
        window.addEventListener('DOMContentLoaded', () => {
            // Read state params from URL or fallback to home dashboard view
            const urlParams = new URLSearchParams(window.location.search);
            const initialRoute = urlParams.get('page') || 'home';
            
            // Check active local user storage tokens to adjust text state values on startup
            const startupAuthUser = localStorage.getItem('currentUser') || localStorage.getItem('user');
            simulateLoginState(!!startupAuthUser);

            // Trigger dynamic navigation engine startup
            navigateToPage(initialRoute);
        });
    </script>
</body>
</html>
