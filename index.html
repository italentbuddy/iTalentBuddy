<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iTalentBuddy | Next-Gen Creator Ecosystem Directory</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        /* 🌌 CORE SYSTEM RESETS & PREMIUM DARK MATRIX */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: system-ui, -apple-system, sans-serif; }
        body { background-color: #010707; color: #ffffff; min-height: 100vh; overflow-x: hidden; }

        /* 🚀 EXACT ORIGINAL NAVIGATION HEADER BAR */
        header { display: flex; justify-content: space-between; align-items: center; padding: 30px 60px; background: #010707; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 32px; font-weight: 800; color: #00e676; text-decoration: none; letter-spacing: -0.5px; display: flex; align-items: center; }
        .logo span { color: #ffffff; font-weight: 500; margin-left: 4px; }
        
        nav { display: flex; gap: 16px; align-items: center; }
        .nav-btn { background: #0c1312; border: 1px solid rgba(255, 255, 255, 0.03); color: #ffffff; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.3s ease; }
        .nav-btn:hover { background: rgba(255, 255, 255, 0.05); }
        .nav-btn.active { background: #5dfd9b; color: #010707; font-weight: 700; box-shadow: 0 0 25px rgba(93, 253, 155, 0.4); }
        
        .navbar-user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid rgba(0, 230, 118, 0.3); margin-left: 10px; cursor: pointer; }

        /* 📺 WORKSPACE SECTION COORDINATORS */
        main { padding: 10px 60px 40px 60px; max-width: 1800px; margin: 0 auto; width: 100%; }
        .page-view { display: none; width: 100%; }
        .page-view.active { display: block; }

        /* 🏡 VIEW 1: PRESERVED ORIGINAL HOME LAYOUT SETUP */
        .home-grid { display: grid; grid-template-columns: 1.1fr 0.9fr; gap: 40px; align-items: start; margin-top: 10px; }
        
        .hero-card { background: #040d0c; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 32px; padding: 100px 60px; min-height: 560px; display: flex; flex-direction: column; justify-content: center; }
        .hero-title { font-size: 64px; font-weight: 800; line-height: 1.1; color: #ffffff; text-transform: uppercase; letter-spacing: -1px; }
        .hero-title span { color: #5dfd9b; }
        .hero-desc { font-size: 16px; color: rgba(255, 255, 255, 0.5); line-height: 1.6; margin-top: 35px; max-width: 580px; }
        
        .form-card { background: #040d0c; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 32px; padding: 50px; }
        .form-title { font-size: 42px; font-weight: 800; color: #ffffff; margin-bottom: 12px; }
        .form-subtitle { font-size: 14px; color: rgba(255, 255, 255, 0.4); margin-bottom: 35px; line-height: 1.5; }
        .form-group { margin-bottom: 25px; }
        .form-label { font-size: 11px; font-weight: 800; text-transform: uppercase; color: #00e676; letter-spacing: 1px; display: block; margin-bottom: 10px; }
        .form-input { width: 100%; background: #020908; border: 1px solid rgba(255, 255, 255, 0.04); padding: 18px; border-radius: 14px; color: #ffffff; font-size: 14px; transition: all 0.3s ease; }
        .form-input:focus { outline: none; border-color: rgba(0, 230, 118, 0.4); background: #030f0e; }
        textarea.form-input { resize: none; min-height: 120px; }
        .submit-btn { width: 100%; background: transparent; border: 1px solid rgba(0, 230, 118, 0.3); color: #00e676; font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; padding: 18px; border-radius: 14px; cursor: pointer; transition: all 0.3s ease; margin-top: 10px; }
        .submit-btn:hover { background: #00e676; color: #010707; font-weight: 800; box-shadow: 0 0 30px rgba(0, 230, 118, 0.3); }

        /* 👥 VIEW 2: ORIGINAL 12-COLUMN PROFILE DIRECTORY SETUP */
        .creators-panel { display: flex; flex-direction: column; gap: 24px; }
        
        .join-cta-banner { background: #040d0c; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 24px; padding: 32px 40px; display: flex; justify-content: space-between; align-items: center; }
        .join-cta-left h2 { font-size: 24px; font-weight: 800; color: #ffffff; margin-bottom: 6px; }
        .join-cta-left p { font-size: 14px; color: rgba(255, 255, 255, 0.5); }
        .join-cta-btn { background: #5dfd9b; color: #010707; font-size: 14px; font-weight: 800; text-transform: uppercase; padding: 16px 28px; border: none; border-radius: 16px; cursor: pointer; display: flex; align-items: center; gap: 10px; transition: transform 0.2s ease; }
        .join-cta-btn:hover { transform: scale(1.02); box-shadow: 0 0 30px rgba(93, 253, 155, 0.4); }

        .creators-grid { display: grid; grid-template-columns: repeat(6, minmax(0, 1fr)); gap: 20px; }
        .creator-card { background: #040d0c; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 24px; padding: 35px 20px; text-align: center; transition: all 0.3s cubic-bezier(0.2, 1, 0.2, 1); }
        .creator-card:hover { border-color: rgba(0, 230, 118, 0.2); transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        
        .img-frame { width: 90px; height: 90px; border-radius: 50%; margin: 0 auto 16px auto; padding: 4px; border: 1px solid rgba(255, 255, 255, 0.05); }
        .img-frame img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
        
        .c-name { font-size: 18px; font-weight: 800; color: #ffffff; margin-bottom: 4px; }
        .c-handle { font-size: 12px; color: rgba(255, 255, 255, 0.4); margin-bottom: 16px; }
        .c-tag { display: inline-block; background: #0c1312; border: 1px solid rgba(255, 255, 255, 0.03); padding: 6px 14px; border-radius: 30px; font-size: 10px; font-weight: 700; color: rgba(255, 255, 255, 0.6); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.5px; }
        .c-niche { font-size: 12px; font-weight: 800; color: #00e676; margin-bottom: 24px; text-transform: uppercase; letter-spacing: 0.5px; }
        
        .c-stats { display: flex; justify-content: space-around; border-top: 1px solid rgba(255, 255, 255, 0.03); padding-top: 18px; }
        .stat-val { font-size: 16px; font-weight: 800; color: #ffffff; }
        .stat-lbl { font-size: 9px; color: rgba(255, 255, 255, 0.3); text-transform: uppercase; margin-top: 2px; font-weight: 600; }

        /* 💼 VIEW 3: DEALS COMPONENT DASHBOARD Layout */
        .deals-placeholder { background: #040d0c; border: 1px solid rgba(255, 255, 255, 0.02); border-radius: 32px; padding: 80px 40px; text-align: center; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 400px; }

        /* 🔮 PREMIUM UNROLL FLOATING WIDGET ELEMENT STYLES */
        .cta-floating-widget { position: fixed !important; bottom: 30px !important; right: 30px !important; z-index: 99999 !important; display: none; align-items: center; justify-content: center; width: 54px; height: 54px; background: rgba(4, 13, 12, 0.95); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(0, 230, 118, 0.35); border-radius: 16px; cursor: pointer; overflow: hidden; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.6); transition: width 0.4s cubic-bezier(0.2, 1, 0.2, 1), height 0.4s cubic-bezier(0.2, 1, 0.2, 1); }
        .cta-floating-widget.state-join:hover { width: 580px; height: 80px; border-radius: 20px; }
        .cta-floating-widget.state-edit:hover { width: 250px; height: 65px; border-radius: 14px; }
        .widget-icon { font-size: 18px; color: #00e676; position: absolute; transition: all 0.3s ease; }
        .cta-floating-widget:hover .widget-icon { opacity: 0; transform: scale(0.5) rotate(90deg); }
        .widget-content { align-items: center; justify-content: space-between; width: 100%; padding: 0 20px; opacity: 0; transform: translateX(10px); transition: opacity 0.3s, transform 0.3s; pointer-events: none; }
        .cta-floating-widget:hover .widget-content { opacity: 1; transform: translateX(0); pointer-events: auto; }
        .cta-text-side { display: flex; flex-direction: column; text-align: left; }
        .cta-text-side h3 { margin: 0; font-size: 14px; font-weight: 700; color: #fff; }
        .cta-text-side p { margin: 3px 0 0 0; font-size: 11px; color: rgba(255, 255, 255, 0.5); max-width: 340px; }
        .cta-btn { background: rgba(0, 230, 118, 0.08); color: #00e676; padding: 10px 16px; border: 1px solid rgba(0, 230, 118, 0.4); border-radius: 10px; font-size: 12px; font-weight: 800; cursor: pointer; white-space: nowrap; transition: all 0.3s ease; }
        .cta-btn:hover { background: #00e676; color: #010707; box-shadow: 0 0 20px rgba(0, 230, 118, 0.4); }

        /* 🔐 COMPULSORY SECURE GATEWAY DIALOG OVERLAY */
        .login-modal-overlay { position: fixed !important; top: 0 !important; left: 0 !important; width: 100% !important; height: 100% !important; background: rgba(1, 7, 7, 0.9); backdrop-filter: blur(8px); z-index: 999999 !important; display: flex; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: all 0.3s ease; }
        .login-modal-overlay.active { opacity: 1; pointer-events: auto; }
        .login-modal-box { background: #040d0c; border: 1px solid rgba(0, 230, 118, 0.15); border-radius: 28px; padding: 40px; width: 400px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.6); }
        .google-login-btn { display: flex; align-items: center; justify-content: center; gap: 12px; background: #ffffff; color: #000000; border: none; padding: 14px 24px; border-radius: 14px; font-weight: 700; width: 100%; cursor: pointer; margin-top: 25px; transition: background 0.2s; font-size: 14px; }
        .google-login-btn:hover { background: #efeef2; }
        .close-modal-x { float: right; cursor: pointer; color: #555; font-size: 24px; margin-top: -15px; margin-right: -5px; transition: color 0.2s; }
        .close-modal-x:hover { color: #fff; }

        /* 📱 RESPONSIVE ADJUSTMENTS */
        @media(max-width: 1500px) { .creators-grid { grid-template-columns: repeat(4, minmax(0, 1fr)); } }
        @media(max-width: 1100px) { .home-grid { grid-template-columns: 1fr; } .creators-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); } header { padding: 25px 30px; } main { padding: 10px 30px 40px 30px; } }
        @media(max-width: 650px) { .creators-grid { grid-template-columns: 1fr; } .join-cta-banner { flex-direction: column; gap: 20px; text-align: center; } }
    </style>
</head>
<body>

    <header>
        <a href="#" class="logo" onclick="switchRoute('home')">iTalent<span>Buddy</span></a>
        <nav>
            <button class="nav-btn" id="btn-home" onclick="switchRoute('home')">Home</button
