<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>iTalentBuddy | Next-Gen Creator Directory</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<style>
*{ box-sizing:border-box; transition: all 0.2s ease-out; }
html, body { margin:0; padding:0; font-family:Inter,Arial,sans-serif; background:#010707; color:#fff; overflow-x:hidden; min-height: 100vh; }
#bg-canvas { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; pointer-events: none; background: radial-gradient(circle at 50% 50%, #021414 0%, #000606 100%); }
.container{ width: 94%; max-width: 1600px; margin: 0 auto; padding: 24px 0; display: flex; flex-direction: column; }
.nav{ display:flex; justify-content:space-between; align-items:center; margin-bottom: 32px; height: 54px; position: relative; z-index: 99; }
.logo{ font-size:36px; font-weight:900; letter-spacing: -1.5px; background: linear-gradient(135deg, #fff 40%, #00e676 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; cursor: pointer; }
#nav{ display:flex; gap:12px; align-items: center; }
#nav a{ padding:10px 20px; border-radius:12px; text-decoration:none; color:rgba(255,255,255,0.65); background:rgba(255,255,255,.02); border: 1px solid rgba(255,255,255,0.06); font-size: 14px; font-weight: 600; }
#nav a:hover, #nav a.active-nav { color: #010707; border-color: #00e676; background: #00e676; box-shadow: 0 0 15px rgba(0, 230, 118, 0.3); }

/* यहाँ से वह डिब्बा हटा दिया है जो लेआउट तोड़ रहा था */
.dynamic-view-wrapper { width: 100%; position: relative; z-index: 10; }
</style>
</head>
<body>
<canvas id="bg-canvas"></canvas>
<div class="container">
    <div class="nav">
        <div class="logo" onclick="window.location.href='index.html'">iTalentBuddy</div>
        <div id="nav">
            <a href="index.html" id="nav-home">Home</a>
            <a href="index.html?page=creators" id="nav-creators">Creators</a>
            <a href="index.html?page=deals" id="nav-deals">Deals</a>
            <a href="index.html?page=agencies" id="nav-agencies">Agencies</a>
        </div>
    </div>
    <div class="dynamic-view-wrapper" id="dynamic-wrapper"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
import { initializeFirestore, persistentLocalCache } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyDGJsSfxHi-DQhWulEV7rQsGumH4k3I_wY",
    authDomain: "italentbuddy-5225d.firebaseapp.com",
    projectId: "italentbuddy-5225d",
    storageBucket: "italentbuddy-5225d.firebasestorage.app",
    messagingSenderId: "31982716088",
    appId: "1:31982716088:web:7a05fc8691b65c6af0604d"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const provider = new GoogleAuthProvider();
const db = initializeFirestore(app, { localCache: persistentLocalCache({}) });

window.appDb = db; 

const urlParams = new URLSearchParams(window.location.search);
let targetPage = (urlParams.get('page') || 'home').toLowerCase().trim();

if (document.getElementById(`nav-${targetPage}`)) {
    document.getElementById(`nav-${targetPage}`).classList.add('active-nav');
}

fetch(`${targetPage}.html`)
    .then(res => { if (!res.ok) throw new Error(); return res.text(); })
    .then(html => {
        document.getElementById('dynamic-wrapper').innerHTML = html;
        executeScripts(document.getElementById('dynamic-wrapper'));
    })
    .catch(() => {
        document.getElementById('dynamic-wrapper').innerHTML = `<h2 style="text-align:center;color:#00e676;margin-top:100px;">Coming Soon!</h2>`;
    });

function executeScripts(container) {
    const scripts = container.querySelectorAll('script');
    scripts.forEach(oldScript => {
        const newScript = document.createElement('script');
        Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
        newScript.appendChild(document.createTextNode(oldScript.innerHTML));
        oldScript.parentNode.replaceChild(newScript, oldScript);
    });
}

window.triggerGmailVerificationWorkflow = function() {
    signInWithPopup(auth, provider)
        .then((result) => {
            localStorage.setItem('userEmail', result.user.email);
            localStorage.setItem('userUid', result.user.uid);
            window.location.href = `index.html?page=onboarding&uid=${result.user.uid}`;
        })
        .catch((error) => {
            console.error("Auth Error: ", error);
            alert("Login Failed: " + error.message);
        });
};
</script>

<script>
const canvas = document.getElementById('bg-canvas'); const ctx = canvas.getContext('2d'); let particles = [];
function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
window.addEventListener('resize', resizeCanvas); resizeCanvas();
class Particle {
    constructor() { this.x = Math.random() * canvas.width; this.y = Math.random() * canvas.height; this.vx = (Math.random() - 0.5) * 0.35; this.vy = (Math.random() - 0.5) * 0.35; this.radius = Math.random() * 2 + 1; }
    update() { this.x += this.vx; this.y += this.vy; if (this.x < 0 || this.x > canvas.width) this.vx *= -1; if (this.y < 0 || this.y > canvas.height) this.vy *= -1; }
    draw() { ctx.beginPath(); ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2); ctx.fillStyle = 'rgba(0, 230, 118, 0.3)'; ctx.fill(); }
}
for (let i = 0; i < 40; i++) particles.push(new Particle());
function animate() { ctx.clearRect(0, 0, canvas.width, canvas.height); particles.forEach(p => { p.update(); p.draw(); }); requestAnimationFrame(animate); }
animate();
</script>
</body>
</html>
