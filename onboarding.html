<style>

<script type="module">
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const db = window.appDb;
const uid = localStorage.getItem('userUid');
let activeSelectedCategories = [];
let profilePicFile = null;

const indiaStates = [
    "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", 
    "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", 
    "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", 
    "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh", 
    "Dadra and Nagar Haveli and Daman and Diu", "Delhi", "Jammu and Kashmir", "Ladakh", "Lakshadweep", "Puducherry"
];

const comprehensiveCategories = [
    "Entertainment", "Gaming", "Education", "Technology", "Science", "Finance", "Business", "Entrepreneurship",
    "News", "Politics", "Sports", "Fitness", "Health", "Mental Health", "Lifestyle", "Vlogging", "Travel", "Food",
    "Cooking", "Beauty", "Fashion", "Music", "Movies", "Television", "Anime", "Comics", "Books", "Literature",
    "Art", "Design", "Photography", "Videography", "Animation", "DIY", "Crafts", "Home Improvement", "Gardening",
    "Agriculture", "Pets", "Animals", "Nature", "Environment", "Religion", "Spirituality", "Philosophy", "History",
    "Geography", "Culture", "Language", "Law", "Real Estate", "Automotive", "Motorcycles", "Aviation", "Boating",
    "Luxury", "Watches", "Jewelry", "Parenting", "Family", "Relationships", "Dating", "Weddings", "Kids", "Toys",
    "Education for Children", "Career", "Jobs", "Recruitment", "Productivity", "Self Improvement", "Motivation",
    "Public Speaking", "Marketing", "Sales", "E-commerce", "Investing", "Cryptocurrency", "Startups",
    "Artificial Intelligence", "Programming", "Cybersecurity", "Software", "Hardware", "Robotics", "Space",
    "Mathematics", "Physics", "Chemistry", "Biology", "Medicine", "Nursing", "Psychology", "Sociology",
    "Economics", "Archaeology", "Documentary", "Interviews", "Podcasts", "Talk Shows", "Reviews", "Reaction Content",
    "Commentary", "ASMR", "Comedy", "Horror", "Mystery", "True Crime", "Paranormal", "Survival", "Prepper",
    "Military", "Defense", "Fire & Rescue", "Social Issues", "Nonprofit", "Charity", "Community", "Events",
    "Festivals", "Celebrities", "Influencers", "Memes", "Internet Culture", "Streaming", "Esports", "Collectibles",
    "Antiques", "Trading Cards", "Education & Tutorials", "How-To Guides", "Unboxing", "Shopping", "Consumer Advice",
    "Local Content", "Regional Content", "Language-Specific Content", "Religion & Faith", "Data & Analytics",
    "Research", "Academia", "Student Life", "Campus Life", "Expat Life", "Digital Nomad", "Sustainability",
    "Minimalism", "Tiny Homes", "Outdoor Life", "Miscellaneous / Other"
];

const mainContainer = document.getElementById('mainOnboardingContainer');

// Helper to control background collision highlights
function setDropdownState(isActive) {
    if (isActive) {
        mainContainer.classList.add('dropdown-active');
    } else {
        mainContainer.classList.remove('dropdown-active');
    }
}

// Profile Pic Upload Preview Pipeline
document.getElementById('profilePicInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        profilePicFile = file;
        const reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('defaultAvatarIcon').style.display = 'none';
            const imgEl = document.getElementById('avatarImg');
            imgEl.src = event.target.result;
            imgEl.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }
});

// State Smart Inline Dropdown Manager
const stateSearch = document.getElementById('stateSearch');
const stateDropdown = document.getElementById('stateDropdown');

function renderStateDropdown(filter = "") {
    stateDropdown.innerHTML = "";
    if(!filter) { stateDropdown.style.display = 'none'; setDropdownState(false); return; }
    const filtered = indiaStates.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
    if(filtered.length === 0) { stateDropdown.style.display = 'none'; setDropdownState(false); return; }
    
    filtered.forEach(state => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerText = state;
        div.addEventListener('click', () => {
            stateSearch.value = state;
            stateDropdown.style.display = 'none';
            setDropdownState(false);
        });
        stateDropdown.appendChild(div);
    });
}
stateSearch.addEventListener('input', (e) => { 
    renderStateDropdown(e.target.value); 
    stateDropdown.style.display = 'block'; 
    setDropdownState(true);
});

// Multi-Select Category Engine (Inline Chip Mounting Architecture)
const categorySearch = document.getElementById('categorySearch');
const categoryDropdown = document.getElementById('categoryDropdown');
const chipsWrapper = document.getElementById('categoryChipsWrapper');

function renderChips() {
    const existingChips = chipsWrapper.querySelectorAll('.category-chip');
    existingChips.forEach(chip => chip.remove());
    
    activeSelectedCategories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'category-chip';
        chip.innerHTML = `${cat} <i class="fa-solid fa-xmark"></i>`;
        chip.querySelector('i').addEventListener('click', (e) => {
            e.stopPropagation();
            activeSelectedCategories = activeSelectedCategories.filter(item => item !== cat);
            renderChips();
            categorySearch.placeholder = activeSelectedCategories.length === 0 ? "Type domain (e.g. Gaming, Finance)..." : "";
        });
        chipsWrapper.insertBefore(chip, categorySearch);
    });
}

function renderCategoryDropdown(filter = "") {
    categoryDropdown.innerHTML = "";
    if (activeSelectedCategories.length >= 5) {
        categoryDropdown.style.display = 'none';
        setDropdownState(false);
        return;
    }
    const filtered = comprehensiveCategories.filter(c => c.toLowerCase().includes(filter.toLowerCase()) && !activeSelectedCategories.includes(c));
    if(filtered.length === 0) { categoryDropdown.style.display = 'none'; setDropdownState(false); return; }
    
    filtered.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerText = cat;
        div.addEventListener('click', (e) => {
            e.stopPropagation();
            if (activeSelectedCategories.length < 5) {
                activeSelectedCategories.push(cat);
                categorySearch.value = "";
                categorySearch.placeholder = "";
                categoryDropdown.style.display = 'none';
                setDropdownState(false);
                renderChips();
            }
        });
        categoryDropdown.appendChild(div);
    });
}

chipsWrapper.addEventListener('click', () => categorySearch.focus());
categorySearch.addEventListener('focus', () => { 
    renderCategoryDropdown(categorySearch.value); 
    categoryDropdown.style.display = 'block'; 
    setDropdownState(true);
});
categorySearch.addEventListener('input', (e) => {
    renderCategoryDropdown(e.target.value);
    setDropdownState(true);
});

document.addEventListener('click', (e) => {
    if(!stateSearch.contains(e.target) && !stateDropdown.contains(e.target)) {
        stateDropdown.style.display = 'none';
    }
    if(!chipsWrapper.contains(e.target) && !categoryDropdown.contains(e.target)) {
        categoryDropdown.style.display = 'none';
    }
    // Agar dono dropdowns band ho chuke hain to state normalization
    if (stateDropdown.style.display === 'none' && categoryDropdown.style.display === 'none') {
        setDropdownState(false);
    }
});

// Init & Prefill Prefetch Sync
async function initPrefillPipeline() {
    if(!db || !uid) return;
    if(localStorage.getItem('userEmail')) document.getElementById('email').value = localStorage.getItem('userEmail');

    try {
        const docRef = doc(db, "creators", uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('realName').value = data.realName || '';
            document.getElementById('brandName').value = data.brandName || '';
            document.getElementById('whatsapp').value = data.whatsapp || '';
            document.getElementById('gender').value = data.gender || 'Male';
            stateSearch.value = data.state || '';
            
            document.getElementById('ytLink').value = data.youtubeLink || '';
            document.getElementById('ytSubs').value = data.youtubeSubs || '';
            document.getElementById('igLink').value = data.instagramLink || '';
            document.getElementById('igFollowers').value = data.instagramFollowers || '';
            document.getElementById('xLink').value = data.xLink || '';
            document.getElementById('xMetrics').value = data.xMetrics || '';
            
            if(data.fbLink) document.getElementById('fbLink').value = data.fbLink;
            if(data.fbMetrics) document.getElementById('fbMetrics').value = data.fbMetrics;
            if(data.kickLink) document.getElementById('kickLink').value = data.kickLink;
            if(data.kickMetrics) document.getElementById('kickMetrics').value = data.kickMetrics;
            if(data.discordLink) document.getElementById('discordLink').value = data.discordLink;
            if(data.discordMetrics) document.getElementById('discordMetrics').value = data.discordMetrics;

            if(data.profilePicUrl) {
                document.getElementById('defaultAvatarIcon').style.display = 'none';
                const imgEl = document.getElementById('avatarImg');
                imgEl.src = data.profilePicUrl;
                imgEl.style.display = 'block';
            }

            if(data.categories) {
                activeSelectedCategories = data.categories.slice(0, 5);
                if(activeSelectedCategories.length > 0) categorySearch.placeholder = "";
                renderChips();
            }
        }
    } catch (err) { console.error("Pipeline failure: ", err); }
}

initPrefillPipeline();

// Form Submit Handler
document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    let uploadedImageUrl = document.getElementById('avatarImg').src || "";
    if (uploadedImageUrl.startsWith('data:')) { uploadedImageUrl = ""; }

    const profileData = {
        realName: document.getElementById('realName').value,
        brandName: document.getElementById('brandName').value,
        whatsapp: document.getElementById('whatsapp').value,
        email: document.getElementById('email').value,
        gender: document.getElementById('gender').value,
        state: stateSearch.value,
        categories: activeSelectedCategories,
        youtubeLink: document.getElementById('ytLink').value,
        youtubeSubs: document.getElementById('ytSubs').value,
        instagramLink: document.getElementById('igLink').value,
        instagramFollowers: document.getElementById('igFollowers').value,
        xLink: document.getElementById('xLink').value,
        xMetrics: document.getElementById('xMetrics').value,
        fbLink: document.getElementById('fbLink').value,
        fbMetrics: document.getElementById('fbMetrics').value,
        kickLink: document.getElementById('kickLink').value,
        kickMetrics: document.getElementById('kickMetrics').value,
        discordLink: document.getElementById('discordLink').value,
        discordMetrics: document.getElementById('discordMetrics').value,
        profilePicUrl: uploadedImageUrl,
        updatedAt: new Date().toISOString()
    };
    
    try {
        await setDoc(doc(db, "creators", uid), profileData);
        window.location.href = "index.html?page=creators";
    } catch (error) { alert("Execution crash: " + error.message); }
});
