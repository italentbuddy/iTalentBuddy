<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Ecosystem Entry | iTalentBuddy</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <style>
        body {
            background-color: #0b0f17;
            color: #ffffff;
            font-family: system-ui, -apple-system, sans-serif;
        }
        input, select, textarea {
            background-color: #131926 !important;
            border: 1px solid #222f47 !important;
            transition: all 0.2s ease;
        }
        input:focus, select:focus, textarea:focus {
            outline: none !important;
            border-color: #10b981 !important;
            box-shadow: 0 0 8px rgba(16, 185, 129, 0.2);
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <div class="max-w-4xl mx-auto">
        
        <div class="mb-10">
            <h1 class="text-3xl md:text-4xl font-bold tracking-tight text-white mb-2">Creator Ecosystem Entry</h1>
            <p class="text-gray-400 text-sm md:text-base">Configure your professional network node. Fill your metrics and save your profile.</p>
        </div>

        <form id="creatorForm" class="space-y-8" onsubmit="handleFormSubmit(event)">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Real Name</label>
                    <input type="text" placeholder="e.g. Rahul Kumar" class="w-full px-4 py-3 rounded-lg text-white">
                </div>
                
                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Alias Name (Brand)</label>
                    <input type="text" placeholder="e.g. TechBuddy" class="w-full px-4 py-3 rounded-lg text-white" required>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">WhatsApp Number</label>
                    <input type="tel" placeholder="+91 XXXXX XXXXX" class="w-full px-4 py-3 rounded-lg text-white">
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Email ID (Auto-Filled)</label>
                    <input type="email" placeholder="name@example.com" class="w-full px-4 py-3 rounded-lg text-gray-400 cursor-not-allowed" readonly>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Gender</label>
                    <select class="w-full px-4 py-3 rounded-lg text-white appearance-none cursor-pointer">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">State (India)</label>
                    <select class="w-full px-4 py-3 rounded-lg text-white appearance-none cursor-pointer">
                        <option value="">Select State</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Mumbai">Maharashtra</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        </select>
                </div>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Profile Punchline / Bio</label>
                <textarea rows="3" placeholder="e.g. Building Next-Gen Tech Ecosystems..." class="w-full px-4 py-3 rounded-lg text-white resize-none"></textarea>
            </div>

            <div class="flex flex-col gap-2">
                <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase">Categories / Domain</label>
                <input type="text" placeholder="Type to filter domains (e.g. Gaming, Tech, Finance, Cooking...)" class="w-full px-4 py-3 rounded-lg text-white">
            </div>

            <div class="space-y-4">
                <label class="text-emerald-400 font-semibold text-xs tracking-wider uppercase block mb-1">Social Platforms & Metrics</label>
                
                <div class="flex flex-col sm:flex-row gap-3 max-w-3xl">
                    <div class="flex-1 min-w-[200px]">
                        <input type="url" placeholder="YouTube Channel Link" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                    <div class="w-full sm:w-48">
                        <input type="text" placeholder="Subs (e.g. 50K, 1.2M)" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 max-w-3xl">
                    <div class="flex-1 min-w-[200px]">
                        <input type="url" placeholder="Instagram Profile Link" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                    <div class="w-full sm:w-48">
                        <input type="text" placeholder="Followers (e.g. 100K)" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                </div>

                <div class="flex flex-col sm:flex-row gap-3 max-w-3xl">
                    <div class="flex-1 min-w-[200px]">
                        <input type="url" placeholder="X Profile Link" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                    <div class="w-full sm:w-48">
                        <input type="text" placeholder="Followers" class="w-full px-4 py-2.5 rounded-lg text-sm text-white">
                    </div>
                </div>
            </div>

            <div class="pt-6 border-t border-gray-800 max-w-3xl flex justify-end">
                <button type="submit" class="w-full sm:w-auto px-8 py-3.5 bg-emerald-500 hover:bg-emerald-600 active:scale-[0.98] text-gray-950 font-bold rounded-lg transition-all cursor-pointer shadow-lg shadow-emerald-500/10">
                    Save and Exit
                </button>
            </div>

        </form>
    </div>

    <script>
        function handleFormSubmit(event) {
            event.preventDefault();
            
            // App ka redirect logic yahan handles hoga (Save logic execute hone ke baad)
            console.log("Saving profile changes...");
            
            // Creator page par redirect
            window.location.href = "creators.html"; 
        }
    </script>
</body>
</html>
