<div class="onboarding-container" style="width: 100%; color: #fff; position: relative; z-index: 20;">
    <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, #fff 60%, #00e676 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Creator Ecosystem Entry</h2>
    <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 30px;">Fill your profile metrics. Real-time changes appear on your premium live card.</p>

    <div style="display: grid; grid-template-columns: 320px 1fr; gap: 40px; position: relative; z-index: 25;">
        
        <div style="position: sticky; top: 20px; height: max-content; display: flex; flex-direction: column; gap: 20px;">
            <div id="image-upload-zone" style="border: 2px dashed rgba(0, 230, 118, 0.4); background: rgba(0, 230, 118, 0.02); border-radius: 20px; height: 180px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; cursor: pointer; position: relative;">
                <input type="file" id="imageInput" accept="image/*" style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 40;">
                <div id="upload-instruction" style="z-index: 30; pointer-events: none;">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 32px; color: #00e676; margin-bottom: 10px;"></i>
                    <div style="font-weight: 700; font-size: 12px; color: #00e676; text-transform: uppercase;">Upload Photo</div>
                </div>
                <img id="avatarRender" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; border-radius:18px; z-index: 35;">
            </div>

            <div id="live-preview-card" style="background: #041010; border: 2px solid #00e676; border-radius: 20px; padding: 24px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5); transition: border-color 0.4s ease;">
                <img id="card-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=placeholder" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; margin: 0 auto 16px; border: 2px solid rgba(255,255,255,0.1);">
                <h3 id="card-brand-name" style="margin: 0 0 6px 0; font-size: 20px; font-weight: 700;">Alias Name</h3>
                <p style="margin: 0 0 16px 0; color: rgba(255,255,255,0.5); font-size: 13px;">
                    <i class="fa-solid fa-location-dot" style="color:#00e676; margin-right: 5px;"></i> <span id="card-location">State, India</span>
                </p>
                
                <div style="display: flex; flex-direction: column; gap: 8px; align-items: center; margin-bottom: 16px; background: rgba(255,255,255,0.02); padding: 10px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04);">
                    <div id="card-yt-stat" style="display: none; align-items: center; gap: 8px; font-size: 13px; color: #fff;">
                        <i class="fa-brands fa-youtube" style="color: #fff;"></i> <span id="card-yt-count">0K</span> Subscribers
                    </div>
                    <div id="card-ig-stat" style="display: none; align-items: center; gap: 8px; font-size: 13px; color: #fff;">
                        <i class="fa-brands fa-instagram" style="color: #fff;"></i> <span id="card-ig-count">0K</span> Followers
                    </div>
                </div>

                <div id="card-category-badge" style="font-size: 11px; color: #00e676; text-transform: uppercase; font-weight:700; background: rgba(0,230,118,0.06); padding: 4px 12px; border-radius: 20px; display: inline-block; max-width: 100%; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    Category
                </div>
            </div>
        </div>

        <form id="onboardingForm" style="display: flex; flex-direction: column; gap: 24px;">
            
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Real Name</label>
                    <input type="text" id="realName" placeholder="e.g. Rahul Kumar" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Asa Name (Alias / Brand)</label>
                    <input type="text" id="brandName" placeholder="e.g. TechBuddy" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">WhatsApp Number</label>
                    <input type="tel" id="whatsapp" placeholder="+91 XXXXX XXXXX" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Email ID (Auto-Filled)</label>
                    <input type="email" id="email" readonly style="width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; color: rgba(255,255,255,0.4); cursor: not-allowed; outline: none;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Gender</label>
                    <select id="gender" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                        <option value="Male">Male</option>
                        <option value="Female">Female</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">State (India)</label>
                    <select id="state" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                        <option value="" disabled selected>Select State</option>
                        <option value="Andhra Pradesh">Andhra Pradesh</option>
                        <option value="Arunachal Pradesh">Arunachal Pradesh</option>
                        <option value="Assam">Assam</option>
                        <option value="Bihar">Bihar</option>
                        <option value="Chhattisgarh">Chhattisgarh</option>
                        <option value="Delhi">Delhi</option>
                        <option value="Goa">Goa</option>
                        <option value="Gujarat">Gujarat</option>
                        <option value="Haryana">Haryana</option>
                        <option value="Himachal Pradesh">Himachal Pradesh</option>
                        <option value="Jharkhand">Jharkhand</option>
                        <option value="Karnataka">Karnataka</option>
                        <option value="Kerala">Kerala</option>
                        <option value="Madhya Pradesh">Madhya Pradesh</option>
                        <option value="Maharashtra">Maharashtra</option>
                        <option value="Manipur">Manipur</option>
                        <option value="Meghalaya">Meghalaya</option>
                        <option value="Mizoram">Mizoram</option>
                        <option value="Nagaland">Nagaland</option>
                        <option value="Odisha">Odisha</option>
                        <option value="Punjab">Punjab</option>
                        <option value="Rajasthan">Rajasthan</option>
                        <option value="Sikkim">Sikkim</option>
                        <option value="Tamil Nadu">Tamil Nadu</option>
                        <option value="Telangana">Telangana</option>
                        <option value="Tripura">Tripura</option>
                        <option value="Uttar Pradesh">Uttar Pradesh</option>
                        <option value="Uttarakhand">Uttarakhand</option>
                        <option value="West Bengal">West Bengal</option>
                    </select>
                </div>
            </div>

            <div style="position: relative;">
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Search / Select Category</label>
                <input type="text" id="categorySearch" placeholder="Type to filter categories (e.g. Gaming, Tech, Finance...)" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                <div id="categoryDropdown" style="display: none; position: absolute; width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 100; margin-top: 5px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
                </div>
            </div>

            <div id="subCategoryContainer" style="display: none;">
                <label id="subCategoryLabel" style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Sub-Category / Game List</label>
                <div style="display: flex; gap: 10px;">
                    <select id="subCategorySelect" style="flex: 1; background: #041010; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    </select>
                    <input type="text" id="customSubCategory" placeholder="Or type your own custom tag..." style="flex: 1; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
            </div>

            <div style="background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.04); padding: 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 16px;">
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase;">Social Platforms & Metrics (Format: 10K, 2.5M)</label>
                
                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px;">
                    <input type="text" id="ytLink" placeholder="YouTube Channel Link" style="background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <input type="text" id="ytSubs" placeholder="Subs (e.g. 50K, 1.2M)" style="background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>

                <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 14px;">
                    <input type="text" id="igLink" placeholder="Instagram Profile Link" style="background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <input type="text" id="igFollowers" placeholder="Followers (e.g. 100K, 5M)" style="background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
            </div>

            <button type="submit" id="submitBtn" class="premium-btn">Save & Exit To Directory</button>
        </form>
    </div>
</div>

<script type="module">
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const db = window.appDb;
const uid = localStorage.getItem('userUid');
let savedAvatarBase64 = "";

const categoryList = [
    "Tech & AI", "Gaming", "Finance & Business", "Vlogging & Travel", 
    "Fashion & Lifestyle", "Education", "Comedy & Entertainment", "Fitness & Health"
];

const subCategories = {
    "Gaming": ["BGMI", "Free Fire", "GTA V", "Minecraft", "Valorant", "Chess"],
    "Tech & AI": ["Gadgets Review", "Coding & Dev", "AI Tools", "Tech News"],
    "Finance & Business": ["Stock Market", "Crypto", "Personal Finance", "Startup Case Studies"]
};

// 1. Filterable Searchable Dropdown Logic
const categorySearch = document.getElementById('categorySearch');
const categoryDropdown = document.getElementById('categoryDropdown');

function renderCategories(filter = "") {
    categoryDropdown.innerHTML = "";
    const filtered = categoryList.filter(c => c.toLowerCase().includes(filter.toLowerCase()));
    
    filtered.forEach(cat => {
        const div = document.createElement('div');
        div.innerText = cat;
        div.style.padding = "12px 16px";
        div.style.cursor = "pointer";
        div.style.color = "#fff";
        div.addEventListener('click', () => {
            categorySearch.value = cat;
            categoryDropdown.style.display = 'none';
            updateSubCategoryView(cat);
            updateCardBadge();
        });
        categoryDropdown.appendChild(div);
    });
}

categorySearch.addEventListener('focus', () => { renderCategories(categorySearch.value); categoryDropdown.style.display = 'block'; });
categorySearch.addEventListener('input', (e) => renderCategories(e.target.value));
document.addEventListener('click', (e) => { if(!categorySearch.contains(e.target) && !categoryDropdown.contains(e.target)) categoryDropdown.style.display = 'none'; });

function updateSubCategoryView(cat) {
    const container = document.getElementById('subCategoryContainer');
    const select = document.getElementById('subCategorySelect');
    if(subCategories[cat]) {
        container.style.display = 'block';
        select.innerHTML = subCategories[cat].map(sub => `<option value="${sub}">${sub}</option>`).join('');
    } else {
        container.style.display = cat ? 'block' : 'none';
        select.innerHTML = `<option value="General">General ${cat}</option>`;
    }
}

// Live card badge sync text helper
function updateCardBadge() {
    const mainCat = categorySearch.value || "Category";
    const customSub = document.getElementById('customSubCategory').value.trim();
    const selectSub = document.getElementById('subCategorySelect').value;
    const subCat = customSub || selectSub || "";
    
    document.getElementById('card-category-badge').innerText = subCat ? `${mainCat} (${subCat})` : mainCat;
}

document.getElementById('subCategorySelect').addEventListener('change', updateCardBadge);
document.getElementById('customSubCategory').addEventListener('input', updateCardBadge);

// 2. Real-time Live Sync Preview & Metric Validator Execution
function validateMetricFormat(val) {
    return /^([0-9]+(\.[0-9]+)?)[KMkm]$/.test(val.trim());
}

document.getElementById('brandName').addEventListener('input', (e) => {
    document.getElementById('card-brand-name').innerText = e.target.value || "Alias Name";
});
document.getElementById('state').addEventListener('change', (e) => {
    document.getElementById('card-location').innerText = `${e.target.value}, India`;
});

const genderNode = document.getElementById('gender');
const previewCard = document.getElementById('live-preview-card');
function syncGenderBorder(gender) {
    if(gender === 'Male') previewCard.style.borderColor = '#00e676';
    else if(gender === 'Female') previewCard.style.borderColor = '#e1306c';
    else previewCard.style.borderColor = '#9b5de5';
}
genderNode.addEventListener('change', (e) => syncGenderBorder(e.target.value));

document.getElementById('ytSubs').addEventListener('input', (e) => {
    const val = e.target.value;
    const statRow = document.getElementById('card-yt-stat');
    if(val) {
        statRow.style.display = 'flex';
        document.getElementById('card-yt-count').innerText = val;
        e.target.style.borderColor = validateMetricFormat(val) ? "rgba(255,255,255,0.06)" : "#ff4444";
    } else { statRow.style.display = 'none'; }
});

document.getElementById('igFollowers').addEventListener('input', (e) => {
    const val = e.target.value;
    const statRow = document.getElementById('card-ig-stat');
    if(val) {
        statRow.style.display = 'flex';
        document.getElementById('card-ig-count').innerText = val;
        e.target.style.borderColor = validateMetricFormat(val) ? "rgba(255,255,255,0.06)" : "#ff4444";
    } else { statRow.style.display = 'none'; }
});

document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            savedAvatarBase64 = evt.target.result;
            document.getElementById('avatarRender').src = savedAvatarBase64;
            document.getElementById('avatarRender').style.display = 'block';
            document.getElementById('card-avatar').src = savedAvatarBase64;
            document.getElementById('upload-instruction').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

// 3. Pre-fill Framework Database Sync pipeline
async function checkExistingUser() {
    if(!db || !uid) return;
    if(localStorage.getItem('userEmail')) document.getElementById('email').value = localStorage.getItem('userEmail');

    try {
        const docRef = doc(db, "creators", uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('realName').value = data.realName || '';
            document.getElementById('brandName
