            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group-premium">
                    <label class="form-label-premium">WhatsApp Number</label>

                </div>
                <div class="form-group-premium">
                    <label class="form-label-premium">Email ID</label>
                    <input type="email" id="email" readonly class="premium-input-box" style="background: rgba(255,255,255,0.01) !important; color: rgba(255,255,255,0.25) !important; cursor: not-allowed; border-color: rgba(255,255,255,0.02) !important;">
                </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                <div class="form-group-premium">
                    <label class="form-label-premium">Gender</label>
                    <select id="gender" class="premium-input-box" style="appearance: none; background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2224%22 height=%2224%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%23ffffff%22 stroke-width=%222%22 stroke-linecap=%22round%22 stroke-linejoin=%22round%22><polyline points=%226 9 12 15 18 9%22></polyline></svg>'); background-repeat: no-repeat; background-position: right 14px center; background-size: 14px;">

                <div class="form-group-premium" style="position: relative;">
                    <label class="form-label-premium">State (India)</label>
                    <input type="text" id="stateSearch" placeholder="Search state..." class="premium-input-box" autocomplete="off">
                    <div id="stateDropdown" class="floating-dropdown"></div>
                </div>
            </div>

            <div style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px;">
                <span style="font-size: 10px; font-weight: 800; color: #00e676; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif;">02. Content Domain</span>
            </div>

            <div class="form-group-premium" style="position: relative;">
                <label class="form-label-premium">Categories Multi-Select</label>
                <input type="text" id="categorySearch" placeholder="Type to filter domains..." class="premium-input-box" autocomplete="off">
                <div id="categoryDropdown" class="floating-dropdown"></div>
                <div id="selectedCategoryChips" style="display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px;"></div>
            </div>

            <div style="border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 6px;">
                <span style="font-size: 10px; font-weight: 800; color: #00e676; letter-spacing: 2px; text-transform: uppercase; font-family: sans-serif;">03. Social Infrastructure Nodes</span>
            </div>

            <div style="display: flex; flex-direction: column; gap: 10px;">
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-youtube"></i></div>
                    <input type="text" id="ytLink" placeholder="YouTube Link" class="premium-input-box">
                    <input type="text" id="ytSubs" placeholder="Subs" class="premium-input-box" style="text-align: center;">
                </div>
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-instagram"></i></div>
                    <input type="text" id="igLink" placeholder="Instagram Link" class="premium-input-box">
                    <input type="text" id="igFollowers" placeholder="Followers" class="premium-input-box" style="text-align: center;">
                </div>
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-x-twitter"></i></div>
                    <input type="text" id="xLink" placeholder="X Link" class="premium-input-box">
                    <input type="text" id="xMetrics" placeholder="Followers" class="premium-input-box" style="text-align: center;">
                </div>
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-facebook-f"></i></div>
                    <input type="text" id="fbLink" placeholder="Facebook Link" class="premium-input-box">
                    <input type="text" id="fbMetrics" placeholder="Followers" class="premium-input-box" style="text-align: center;">
                </div>
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-kickstarter-k"></i></div>
                    <input type="text" id="kickLink" placeholder="Kick Link" class="premium-input-box">
                    <input type="text" id="kickMetrics" placeholder="Followers" class="premium-input-box" style="text-align: center;">
                </div>
                <div class="social-input-row-premium">
                    <div class="social-icon-box-premium" style="color: #fff;"><i class="fa-brands fa-discord"></i></div>
                    <input type="text" id="discordLink" placeholder="Discord Invite Link" class="premium-input-box">
                    <input type="text" id="discordMetrics" placeholder="Members" class="premium-input-box" style="text-align: center;">
                </div>
            </div>

            <button type="submit" id="submitBtn">Publish Node</button>
        </form>
    </div>

    <div class="preview-section" style="background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); border-radius: 18px; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-sizing: border-box; height: 100%; transition: border-color 0.4s, background 0.4s;">
        
        <div id="live-preview-card" style="width: 100%; max-width: 290px; height: 90%; max-height: 520px; background: #040d0d; border: 2px solid #00f0ff; border-radius: 20px; box-shadow: 0 25px 50px rgba(0,240,255,0.1); overflow: hidden; display: flex; flex-direction: column; position: relative; transition: border-color 0.3s ease, box-shadow 0.3s ease;">
            
            <div id="image-upload-zone" style="width: 100%; height: 55%; background: #071515; border-bottom: 1px solid rgba(255,255,255,0.05); position: relative; display: flex; align-items: center; justify-content: center; cursor: pointer; overflow: hidden;">
                <input type="file" id="imageInput" accept="image/*" style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 40;">
                <div id="upload-instruction" style="text-align: center; color: rgba(255,255,255,0.5); z-index: 30; pointer-events: none; font-family: sans-serif;">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 28px; margin-bottom: 8px; color: inherit;"></i>
                    <div style="font-weight: 700; font-size: 10px; letter-spacing: 1px;">UPLOAD PROFILE PIC</div>
                </div>
                <img id="avatarRender" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; object-fit: cover; z-index: 35;">
            </div>

            <div style="padding: 16px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; background: linear-gradient(180deg, rgba(4,13,13,0) 0%, #030a0a 100%); box-sizing: border-box; font-family: sans-serif;">
                <div>
                    <h3 id="card-brand-name" style="font-size: 22px; font-weight: 800; margin: 0 0 4px 0; letter-spacing: -0.5px; color: #fff;">Alias Name</h3>
                    <p style="margin: 0; color: rgba(255,255,255,0.4); font-size: 12px; display: flex; align-items: center; gap: 6px;">
                        <i class="fa-solid fa-location-dot" style="color: inherit;"></i> <span id="card-location">State, India</span>
                    </p>
                </div>

                <div id="card-category-badge-container" style="display: flex; flex-wrap: wrap; gap: 4px; margin: 8px 0;">
                    <div style="font-size: 8px; color: #fff; text-transform: uppercase; font-weight:800; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">No Domain</div>
                </div>

                <div id="card-social-grid" style="display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; border-top: 1px solid rgba(255,255,255,0.06); padding-top: 12px;">
                    </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const db = window.appDb;
const uid = localStorage.getItem('userUid');
let savedAvatarBase64 = "";
let activeSelectedCategories = [];

const indiaStates = [
    "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa", "Gujarat", "Haryana", 
    "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh", "Maharashtra", "Manipur", 
    "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim", "Tamil Nadu", "Telangana", 
    "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh", 
    "Dadra and Nagar Haveli and Daman and Diu", "Delhi", "Jammu and Kashmir", "Ladakh", "Lakshadweep", "Puducherry"
];

// CLEAN DIRECTORY LIST - NO '&' USED
const comprehensiveCategories = [
    "Tech AI", "Gaming Esports", "Finance Trading", "Vlogging Travel", "Fashion Lifestyle", 
    "Education Academics", "Comedy Roasting", "Fitness Health", "Art Design", "Business Startups",
    "Crypto Web3", "Food Cooking", "Music Dance", "Photography Film", "Infotainment", "Automobile",
    "Motovlogging", "Beauty Skincare", "Reaction", "Unboxing Reviews", "Daily Vlogs", "Anime Manga",
    "Gaming Walkthroughs", "Podcast Interviews", "Case Studies", "History Mythology", "Self Improvement"
];

const genderColorMap = {
    "Male": { color: "#00f0ff", glow: "rgba(0,240,255,0.15)" },
    "Female": { color: "#ec008c", glow: "rgba(236,0,140,0.15)" },
    "Other": { color: "#00e676", glow: "rgba(0,230,118,0.15)" }
};

function updateGenderTheme() {
    const genVal = document.getElementById('gender').value;
    const theme = genderColorMap[genVal] || genderColorMap["Male"];
    const card = document.getElementById('live-preview-card');
    
    card.style.borderColor = theme.color;
    card.style.boxShadow = `0 25px 50px ${theme.glow}`;
    
    const locIcon = card.querySelector('.fa-location-dot');
    if(locIcon) locIcon.style.color = theme.color;
    
    const textboxes = card.querySelectorAll('.social-preview-pill i');
    textboxes.forEach(i => i.style.color = "#fff");
}
document.getElementById('gender').addEventListener('change', updateGenderTheme);

const stateSearch = document.getElementById('stateSearch');
const stateDropdown = document.getElementById('stateDropdown');

function renderStateDropdown(filter = "") {
    stateDropdown.innerHTML = "";
    const filtered = indiaStates.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
    if(filtered.length === 0) { stateDropdown.style.display = 'none'; return; }
    
    filtered.forEach(state => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerText = state;
        div.addEventListener('click', () => {
            stateSearch.value = state;
            stateDropdown.style.display = 'none';
            document.getElementById('card-location').innerText = `${state}, India`;
        });
        stateDropdown.appendChild(div);
    });
}
stateSearch.addEventListener('focus', () => { renderStateDropdown(stateSearch.value); stateDropdown.style.display = 'block'; });
stateSearch.addEventListener('input', (e) => renderStateDropdown(e.target.value));

const categorySearch = document.getElementById('categorySearch');
const categoryDropdown = document.getElementById('categoryDropdown');
const chipsContainer = document.getElementById('selectedCategoryChips');

function syncCategoryCardBadges() {
    const cardBadgeBox = document.getElementById('card-category-badge-container');
    cardBadgeBox.innerHTML = "";
    if(activeSelectedCategories.length === 0) {
        cardBadgeBox.innerHTML = `<div style="font-size: 8px; color: #fff; text-transform: uppercase; font-weight:800; background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);">No Domain</div>`;
        return;
    }
    activeSelectedCategories.slice(0, 2).forEach(cat => {
        const badge = document.createElement('div');
        badge.style = "font-size: 8px; color: #fff; text-transform: uppercase; font-weight:800; background: rgba(255,255,255,0.06); padding: 4px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.12);";
        badge.innerText = cat;
        cardBadgeBox.appendChild(badge);
    });
}

function renderChips() {
    chipsContainer.innerHTML = "";
    activeSelectedCategories.forEach(cat => {
        const chip = document.createElement('div');
        chip.className = 'category-chip';
        chip.innerHTML = `${cat} <i class="fa-solid fa-xmark"></i>`;
        chip.querySelector('i').addEventListener('click', () => {
            activeSelectedCategories = activeSelectedCategories.filter(item => item !== cat);
            renderChips();
            syncCategoryCardBadges();
        });
        chipsContainer.appendChild(chip);
    });
}

function renderCategoryDropdown(filter = "") {
    categoryDropdown.innerHTML = "";
    const filtered = comprehensiveCategories.filter(c => c.toLowerCase().includes(filter.toLowerCase()) && !activeSelectedCategories.includes(c));
    if(filtered.length === 0) { categoryDropdown.style.display = 'none'; return; }
    
    filtered.forEach(cat => {
        const div = document.createElement('div');
        div.className = 'dropdown-item';
        div.innerText = cat;
        div.addEventListener('click', () => {
            activeSelectedCategories.push(cat);
            categorySearch.value = "";
            categoryDropdown.style.display = 'none';
            renderChips();
            syncCategoryCardBadges();
        });
        categoryDropdown.appendChild(div);
    });
}
categorySearch.addEventListener('focus', () => { renderCategoryDropdown(categorySearch.value); categoryDropdown.style.display = 'block'; });
categorySearch.addEventListener('input', (e) => renderCategoryDropdown(e.target.value));

function updateSocialGridPreview() {
    const grid = document.getElementById('card-social-grid');
    grid.innerHTML = "";
    
    const platforms = [
        { id: 'ytSubs', icon: 'fa-brands fa-youtube', fallback: '0K' },
        { id: 'igFollowers', icon: 'fa-brands fa-instagram', fallback: '0K' },
        { id: 'xMetrics', icon: 'fa-brands fa-x-twitter', fallback: '0' },
        { id: 'fbMetrics', icon: 'fa-brands fa-facebook-f', fallback: '0' },
        { id: 'kickMetrics', icon: 'fa-brands fa-kickstarter-k', fallback: '0' },
        { id: 'discordMetrics', icon: 'fa-brands fa-discord', fallback: '0' }
    ];
    
    platforms.forEach(p => {
        const val = document.getElementById(p.id).value || p.fallback;
        const block = document.createElement('div');
        block.className = 'social-preview-pill';
        block.style = "display: flex; align-items: center; gap: 6px; background: rgba(255,255,255,0.03); padding: 6px 8px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.04); overflow: hidden;";
        block.innerHTML = `<i class="${p.icon}" style="color: #fff; font-size: 13px;"></i><span style="font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.85); text-overflow: ellipsis; overflow: hidden; white-space: nowrap;">${val}</span>`;
        grid.appendChild(block);
    });
}

['ytSubs','igFollowers','xMetrics','fbMetrics','kickMetrics','discordMetrics'].forEach(id => {
    document.getElementById(id).addEventListener('input', updateSocialGridPreview);
});

document.addEventListener('click', (e) => {
    if(!stateSearch.contains(e.target) && !stateDropdown.contains(e.target)) stateDropdown.style.display = 'none';
    if(!categorySearch.contains(e.target) && !categoryDropdown.contains(e.target)) categoryDropdown.style.display = 'none';
});

document.getElementById('brandName').addEventListener('input', (e) => {
    document.getElementById('card-brand-name').innerText = e.target.value || "Alias Name";
});

document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            savedAvatarBase64 = evt.target.result;
            document.getElementById('avatarRender').src = savedAvatarBase64;
            document.getElementById('avatarRender').style.display = 'block';
            document.getElementById('upload-instruction').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

async function initPrefillPipeline() {
    if(!db || !uid) return;
    if(localStorage.getItem('userEmail')) document.getElementById('email').value = localStorage.getItem('userEmail');

    try {
        const docRef = doc(db, "creators", uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            document.getElementById('realName').value = data.realName || '';
            document.getElementById('brandName').value = data.brandName || '';
            document.getElementById('whatsapp').value = data.whatsapp || '';
            document.getElementById('gender').value = data.gender || 'Male';
            stateSearch.value = data.state || '';
            
            document.getElementById('ytLink').value = data.youtubeLink || '';
            document.getElementById('ytSubs').value = data.youtubeSubs || '';
            document.getElementById('igLink').value = data.instagramLink || '';
            document.getElementById('igFollowers').value = data.instagramFollowers || '';
            document.getElementById('xLink').value = data.xLink || '';
            document.getElementById('xMetrics').value = data.xMetrics || '';
            
            if(data.fbLink) document.getElementById('fbLink').value = data.fbLink;
            if(data.fbMetrics) document.getElementById('fbMetrics').value = data.fbMetrics;
            if(data.kickLink) document.getElementById('kickLink').value = data.kickLink;
            if(data.kickMetrics) document.getElementById('kickMetrics').value = data.kickMetrics;
            if(data.discordLink) document.getElementById('discordLink').value = data.discordLink;
            if(data.discordMetrics) document.getElementById('discordMetrics').value = data.discordMetrics;

            if(data.categories) {
                activeSelectedCategories = data.categories;
                renderChips();
                syncCategoryCardBadges();
            }

            if(data.brandName) document.getElementById('card-brand-name').innerText = data.brandName;
            if(data.state) document.getElementById('card-location').innerText = `${data.state}, India`;
            
            if(data.avatarUrl) {
                savedAvatarBase64 = data.avatarUrl;
                document.getElementById('avatarRender').src = data.avatarUrl;
                document.getElementById('avatarRender').style.display = 'block';
                document.getElementById('upload-instruction').style.display = 'none';
            }
        }
        updateGenderTheme();
        updateSocialGridPreview();
    } catch (err) { console.error("Pipeline failure: ", err); }
}

initPrefillPipeline();

document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const profileData = {
        realName: document.getElementById('realName').value,
        brandName: document.getElementById('brandName').value,
        whatsapp: document.getElementById('whatsapp').value,
        email: document.getElementById('email').value,
        gender: document.getElementById('gender').value,
        state: stateSearch.value,
        categories: activeSelectedCategories,
        youtubeLink: document.getElementById('ytLink').value,
        youtubeSubs: document.getElementById('ytSubs').value,
        instagramLink: document.getElementById('igLink').value,
        instagramFollowers: document.getElementById('igFollowers').value,
        xLink: document.getElementById('xLink').value,
        xMetrics: document.getElementById('xMetrics').value,
        fbLink: document.getElementById('fbLink').value,
        fbMetrics: document.getElementById('fbMetrics').value,
        kickLink: document.getElementById('kickLink').value,
        kickMetrics: document.getElementById('kickMetrics').value,
        discordLink: document.getElementById('discordLink').value,
        discordMetrics: document.getElementById('discordMetrics').value,
        avatarUrl: savedAvatarBase64,
        updatedAt: new Date().toISOString()
    };
    try {
        await setDoc(doc(db, "creators", uid), profileData);
        window.location.href = "index.html?page=creators";
    } catch (error) { alert("Execution crash: " + error.message); }
});
</script>

<style>

    position: absolute; 
    width: 100%; 
    background: #050e0e; 
    border: 1px solid rgba(255,255,255,0.12); 
    border-radius: 10px; 
    max-height: 140px; 
    overflow-y: auto; 
    z-index: 100; 
    margin-top: 4px; 
    box-shadow: 0 10px 30px rgba(0,0,0,0.8);

.dropdown-item:hover { background: rgba(0, 230, 118, 0.08); color: #00e676; }

.category-chip {
    display: flex; align-items: center; gap: 6px; background: rgba(0, 230, 118, 0.06);
    border: 1px solid rgba(0, 230, 118, 0.15); color: #00e676; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-family: sans-serif;
}
.category-chip i { cursor: pointer; color: rgba(255,255,255,0.3); }
.category-chip i:hover { color: #ff4444; }

.social-input-row-premium {
    display: grid; grid-template-columns: 40px 1fr 110px; gap: 10px; align-items: center; width: 100%;
