<div class="onboarding-container" style="width: 100%; color: #fff; position: relative; z-index: 20;">
    <h2 style="font-size: 32px; font-weight: 800; margin-bottom: 6px; background: linear-gradient(135deg, #fff 60%, #00e676 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Creator Ecosystem Entry</h2>
    <p style="color: rgba(255,255,255,0.5); font-size: 14px; margin-bottom: 30px;">Fill your profile metrics. If you have already registered, your old data will auto-load below.</p>

    <form id="onboardingForm" style="display: grid; grid-template-columns: 280px 1fr; gap: 40px; position: relative; z-index: 25;">
        
        <div style="display: flex; flex-direction: column; gap: 20px;">
            <div id="image-upload-zone" style="border: 2px dashed rgba(0, 230, 118, 0.4); background: rgba(0, 230, 118, 0.02); border-radius: 20px; height: 240px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; cursor: pointer; position: relative;">
                <input type="file" id="imageInput" accept="image/*" style="position: absolute; width: 100%; height: 100%; opacity: 0; cursor: pointer; z-index: 40;">
                <div id="upload-instruction" style="z-index: 30; pointer-events: none;">
                    <i class="fa-solid fa-cloud-arrow-up" style="font-size: 40px; color: #00e676; margin-bottom: 15px;"></i>
                    <div style="font-weight: 700; font-size: 14px; color: #00e676; text-transform: uppercase;">Upload Photo</div>
                    <div style="font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 8px;">(CLICK TO SELECT)</div>
                </div>
                <img id="avatarRender" style="display: none; position: absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; border-radius:18px; z-index: 35;">
            </div>

            <div>
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Gender</label>
                <select id="gender" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">State (India)</label>
                <select id="state" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <option value="" disabled selected>Select State</option>
                    <option value="Maharashtra">Maharashtra</option>
                    <option value="Delhi">Delhi</option>
                    <option value="Karnataka">Karnataka</option>
                    <option value="Uttar Pradesh">Uttar Pradesh</option>
                    <option value="Haryana">Haryana</option>
                </select>
            </div>
        </div>

        <div style="display: flex; flex-direction: column; gap: 24px;">
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Real Name</label>
                    <input type="text" id="realName" placeholder="e.g. Rahul Kumar" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Asa Name (Alias / Brand)</label>
                    <input type="text" id="brandName" placeholder="e.g. TechBuddy" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
            </div>

            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px;">
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">WhatsApp Number</label>
                    <input type="tel" id="whatsapp" placeholder="+91 XXXXX XXXXX" required style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
                <div>
                    <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Email ID (Auto-Filled)</label>
                    <input type="email" id="email" readonly style="width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 14px; color: rgba(255,255,255,0.4); cursor: not-allowed; outline: none;">
                </div>
            </div>

            <div>
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 8px;">Select Content Categories</label>
                <select id="category" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <option value="Tech & AI">Tech & AI</option>
                    <option value="Vlogging & Travel">Vlogging & Travel</option>
                    <option value="Finance & Business">Finance & Business</option>
                    <option value="Gaming">Gaming</option>
                </select>
            </div>

            <div>
                <label style="display: block; font-size: 12px; font-weight: 700; color: #00e676; text-transform: uppercase; margin-bottom: 12px;">Social Media Links</label>
                <div style="display: flex; flex-direction: column; gap: 12px;">
                    <input type="text" id="ytLink" placeholder="YouTube Channel Link" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                    <input type="text" id="igLink" placeholder="Instagram Profile Link" style="width: 100%; background: #041010; border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; padding: 14px; color: #fff; outline: none;">
                </div>
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; background: #00e676; color: #010707; font-size: 16px; font-weight: 800; border: none; padding: 16px; border-radius: 14px; cursor: pointer; margin-top: 10px; display: block; position: relative; z-index: 999; text-transform: uppercase; letter-spacing: 0.5px;">Publish To Directory</button>
        </div>
    </form>
</div>

<script type="module">
import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

const db = window.appDb;
const uid = localStorage.getItem('userUid');
let savedAvatarBase64 = "";

// 1. Live Photo Preview Setup
document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if(file) {
        const reader = new FileReader();
        reader.onload = function(evt) {
            savedAvatarBase64 = evt.target.result;
            document.getElementById('avatarRender').src = savedAvatarBase64;
            document.getElementById('avatarRender').style.display = 'block';
            document.getElementById('upload-instruction').style.display = 'none';
        };
        reader.readAsDataURL(file);
    }
});

// 2. Pre-fill Logic (पुराना डेटा ढूंढकर वापस फॉर्म में लोड करना)
async function checkExistingUser() {
    if(!db || !uid) return;
    
    // ईमेल ऑटो-फिल करें
    if(localStorage.getItem('userEmail')) {
        document.getElementById('email').value = localStorage.getItem('userEmail');
    }

    try {
        const docRef = doc(db, "creators", uid);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists()) {
            const data = docSnap.data();
            // फॉर्म इनपुट्स को पुराने डेटा से भरना
            document.getElementById('realName').value = data.realName || '';
            document.getElementById('brandName').value = data.brandName || '';
            document.getElementById('whatsapp').value = data.whatsapp || '';
            document.getElementById('gender').value = data.gender || 'Male';
            document.getElementById('state').value = data.state || '';
            document.getElementById('category').value = data.category || 'Tech & AI';
            document.getElementById('ytLink').value = data.youtubeLink || '';
            document.getElementById('igLink').value = data.instagramLink || '';
            
            if(data.avatarUrl) {
                savedAvatarBase64 = data.avatarUrl;
                document.getElementById('avatarRender').src = data.avatarUrl;
                document.getElementById('avatarRender').style.display = 'block';
                document.getElementById('upload-instruction').style.display = 'none';
            }
        }
    } catch (err) {
        console.error("Error fetching pre-fill details:", err);
    }
}

// Invoke check on startup
checkExistingUser();

// 3. Form Submission Handling
document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    if(!db || !uid) {
        alert("Session Expired. Please login again via Creators Tab.");
        return;
    }

    const profileData = {
        realName: document.getElementById('realName').value,
        brandName: document.getElementById('brandName').value,
        whatsapp: document.getElementById('whatsapp').value,
        email: document.getElementById('email').value,
        gender: document.getElementById('gender').value,
        state: document.getElementById('state').value,
        category: document.getElementById('category').value,
        youtubeLink: document.getElementById('ytLink').value,
        instagramLink: document.getElementById('igLink').value,
        avatarUrl: savedAvatarBase64,
        updatedAt: new Date().toISOString()
    };

    try {
        await setDoc(doc(db, "creators", uid), profileData);
        alert("Awesome! Profile details saved successfully.");
        window.location.href = "index.html?page=creators";
    } catch (error) {
        console.error("Firestore Save Error: ", error);
        alert("Error saving data: " + error.message);
    }
});
</script>

<style>
#submitBtn:hover {
    background: #00ff81 !important;
    box-shadow: 0 0 20px rgba(0, 255, 129, 0.4);
    transform: translateY(-2px);
}
#submitBtn:active {
    transform: translateY(1px);
}
</style>
