<div id="onboardScreen" class="screen-view" style="display: none;">
  <nav class="nav-bar">
    <div class="logo">iTalent<span>Buddy</span></div>
    <div class="nav-actions">
      <button class="btn btn-secondary" onclick="showScreen('homeScreen')">
        <i class="fa-solid fa-arrow-left"></i> Back to Directory
      </button>
    </div>
  </nav>

  <div class="main-container onboarding-layout">
    
    <div class="preview-sidebar">
      <div class="preview-sticky-wrap">
        <h3 class="section-title"><i class="fa-solid fa-eye"></i> Live Preview</h3>
        
        <div class="creator-card preview-card-compact">
          <div class="card-hero">
            <div class="avatar-container">
              <i class="fa-solid fa-user" id="cardDefaultAvatarIcon"></i>
              <img id="cardAvatarImg" src="" alt="Avatar" style="display:none; width:100%; height:100%; object-fit:cover; border-radius:50%;">
            </div>
            <div class="hero-details">
              <h2 id="cardName" class="glow-text">Your Name</h2>
              <p id="cardHandle">@handle</p>
              <div class="card-badges" id="cardBadges">
                </div>
            </div>
          </div>
          
          <div class="card-body-compact">
            <p id="cardBio" class="bio-text-preview">Your professional bio and motto goes here...</p>
            
            <div class="metrics-preview-grid">
              <div class="metric-preview-item" id="previewYt" style="display:none;">
                <i class="fa-brands fa-youtube" style="color: #ff0000;"></i> <span id="lblYt">0</span>
              </div>
              <div class="metric-preview-item" id="previewIg" style="display:none;">
                <i class="fa-brands fa-instagram" style="color: #e1306c;"></i> <span id="lblIg">0</span>
              </div>
              <div class="metric-preview-item" id="previewX" style="display:none;">
                <i class="fa-brands fa-x-twitter" style="color: #fff;"></i> <span id="lblX">0</span>
              </div>
            </div>
          </div>
        </div>
        
      </div>
    </div>

    <div class="form-content-area">
      <div class="form-card-clean">
        <h2 class="form-heading">Create Your Creator Profile</h2>
        <p class="form-subheading">Fill in your details to get listed on the elite directory.</p>
        
        <form id="onboardingForm" onsubmit="handleOnboardingSubmit(event)">
          <div class="form-row-2">
            <div class="form-group">
              <label for="fullName">Full Name</label>
              <input type="text" id="fullName" placeholder="e.g. Alex Rivera" required oninput="updatePreview()">
            </div>
            <div class="form-group">
              <label for="username">Username / Handle</label>
              <input type="text" id="username" placeholder="e.g. alexcreates" required oninput="updatePreview()">
            </div>
          </div>

          <div class="form-group">
            <label for="userBio">Short Bio</label>
            <textarea id="userBio" rows="3" placeholder="Tell the world what you do in a few sentences..." required oninput="updatePreview()"></textarea>
          </div>

          <div class="form-group">
            <label for="profilePic">Profile Picture URL</label>
            <input type="url" id="profilePic" placeholder="https://images.unsplash.com/... or any image link" oninput="updatePreview()">
          </div>

          <div class="form-group">
            <label>Select Categories</label>
            <div class="category-pill-selection">
              <span class="pill-option" onclick="toggleFormCategory(this, 'Tech')">Tech</span>
              <span class="pill-option" onclick="toggleFormCategory(this, 'Lifestyle')">Lifestyle</span>
              <span class="pill-option" onclick="toggleFormCategory(this, 'Gaming')">Gaming</span>
              <span class="pill-option" onclick="toggleFormCategory(this, 'Finance')">Finance</span>
              <span class="pill-option" onclick="toggleFormCategory(this, 'Education')">Education</span>
              <span class="pill-option" onclick="toggleFormCategory(this, 'Design')">Design</span>
            </div>
          </div>

          <h3 class="inner-section-title">Social Media Integration</h3>
          
          <div class="social-input-grid">
            <div class="social-input-box">
              <div class="input-with-icon">
                <i class="fa-brands fa-youtube yt-color"></i>
                <input type="url" id="ytLink" placeholder="YouTube Channel Link" oninput="updatePreview()">
              </div>
              <input type="text" id="ytSubs" placeholder="e.g. 150K" oninput="updatePreview()">
            </div>

            <div class="social-input-box">
              <div class="input-with-icon">
                <i class="fa-brands fa-instagram ig-color"></i>
                <input type="url" id="igLink" placeholder="Instagram Profile Link" oninput="updatePreview()">
              </div>
              <input type="text" id="igFollowers" placeholder="e.g. 80K" oninput="updatePreview()">
            </div>

            <div class="social-input-box">
              <div class="input-with-icon">
                <i class="fa-brands fa-x-twitter x-color"></i>
                <input type="url" id="xLink" placeholder="X Profile Link" oninput="updatePreview()">
              </div>
              <input type="text" id="xMetrics" placeholder="e.g. 25K" oninput="updatePreview()">
            </div>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary btn-wide">
              <i class="fa-solid fa-rocket"></i> Publish Profile
            </button>
          </div>
        </form>
      </div>
    </div>

  </div>
</div>

<style>
/* Exact Background & Card Theme Matching with Home */
#onboardScreen {
  background: radial-gradient(circle at 50% 50%, #021414 0%, #000606 100%) !important;
}

.onboarding-layout {
  display: flex;
  gap: 30px;
  align-items: flex-start;
  max-width: 1200px;
  margin: 30px auto;
  padding: 0 20px;
}

/* Compact Left Sidebar to Prevent Scrolling */
.preview-sidebar {
  flex: 0 0 350px;
  position: sticky;
  top: 90px;
}

.preview-sticky-wrap {
  background: rgba(4, 28, 28, 0.6);
  border: 1px solid rgba(0, 240, 255, 0.15);
  border-radius: 16px;
  padding: 20px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
}

/* Compact Live Card Layout */
.preview-card-compact {
  background: linear-gradient(135deg, rgba(5, 38, 38, 0.8) 0%, rgba(2, 16, 16, 0.9) 100%) !important;
  border: 1px solid rgba(0, 240, 255, 0.25) !important;
  border-radius: 12px;
  padding: 16px;
  margin-top: 15px;
}

.card-body-compact {
  margin-top: 12px;
  border-top: 1px solid rgba(255, 255, 255, 0.08);
  padding-top: 12px;
}

.bio-text-preview {
  font-size: 0.9rem;
  color: #ccc;
  line-height: 1.4;
  margin-bottom: 12px;
}

.metrics-preview-grid {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}

.metric-preview-item {
  background: rgba(255, 255, 255, 0.05);
  padding: 6px 12px;
  border-radius: 20px;
  font-size: 0.85rem;
  display: flex;
  align-items: center;
  gap: 6px;
}

/* Clean Right Form (No Extra Inner Boxes/Borders) */
.form-content-area {
  flex: 1;
}

.form-card-clean {
  background: rgba(4, 28, 28, 0.4);
  border: 1px solid rgba(0, 240, 255, 0.1);
  border-radius: 16px;
  padding: 30px;
}

.form-heading {
  font-size: 1.8rem;
  margin-bottom: 6px;
  background: linear-gradient(45deg, #fff, #00f0ff);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}

.form-subheading {
  color: #888;
  font-size: 0.95rem;
  margin-bottom: 25px;
}

.inner-section-title {
  font-size: 1.1rem;
  color: #00f0ff;
  margin: 25px 0 15px 0;
  border-bottom: 1px solid rgba(0, 240, 255, 0.2);
  padding-bottom: 6px;
}

/* Social Inputs Refactored (Removes Outer Heavy Boxes) */
.social-input-grid {
  display: flex;
  flex-direction: column;
  gap: 15px;
}

.social-input-box {
  display: grid;
  grid-template-columns: 2fr 1fr;
  gap: 12px;
  background: transparent;
  padding: 0;
  border: none;
}

.input-with-icon {
  position: relative;
  display: flex;
  align-items: center;
}

.input-with-icon i {
  position: absolute;
  left: 12px;
  font-size: 1.1rem;
}

.input-with-icon input {
  padding-left: 40px !important;
}

/* Category Pill Selections */
.category-pill-selection {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-top: 8px;
}

.pill-option {
  background: rgba(255, 255, 255, 0.05);
  border: 1px solid rgba(255, 255, 255, 0.1);
  padding: 6px 14px;
  border-radius: 20px;
  cursor: pointer;
  font-size: 0.88rem;
  transition: all 0.2s ease;
}

.pill-option.active, .pill-option:hover {
  background: rgba(0, 240, 255, 0.15);
  border-color: #00f0ff;
  color: #00f0ff;
}

.yt-color { color: #ff0000; }
.ig-color { color: #e1306c; }
.x-color { color: #fff; }
</style>
