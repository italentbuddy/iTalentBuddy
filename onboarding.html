<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>
  /* 🌟 PREMIUM DASHBOARD-STYLE TWO-COLUMN INTEGRATION */
  .onboarding-container { 
    display: grid;
    grid-template-columns: 360px 1fr; 
    gap: 28px; 
    width: 100%;
    justify-content: flex-start; 
    height: auto; 
    box-sizing: border-box;
  } 

  /* 🔥 OPTIMIZED COMPACT LEFT CARD (No Extra Scrolling) */
  .creator-preview-card-9-16 { 
    width: 100%; 
    max-height: 520px;
    background: rgba(255, 255, 255, 0.015) !important;
    border: 1px solid rgba(255, 255, 255, 0.03) !important;
    border-radius: 18px !important; 
    padding: 24px; 
    box-sizing: border-box; 
    display: flex; 
    flex-direction: column; 
    justify-content: flex-start; 
    position: relative; 
    overflow: hidden;
    box-shadow: 0 25px 60px rgba(0,0,0,0.6); 
  } 

  .card-avatar-container { 
    width: 110px; 
    height: 110px; 
    border-radius: 50%; 
    position: relative;
    margin: 16px auto; 
    border: 2px dashed rgba(0, 230, 118, 0.25); 
    background: rgba(0,0,0,0.2); 
    padding: 4px; 
    cursor: pointer;
  } 

  .card-avatar-inner { 
    width: 100%; 
    height: 100%; 
    border-radius: 50%; 
    overflow: hidden; 
    display: flex; 
    align-items: center;
    justify-content: center; 
    position: relative; 
  } 

  .card-avatar-inner img { 
    width: 100%; 
    height: 100%; 
    object-fit: cover;
  } 

  .avatar-hover-overlay { 
    position: absolute; 
    top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(1, 7, 7, 0.75); 
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.25s ease; 
  } 

  .card-avatar-container:hover .avatar-hover-overlay { opacity: 1; } 

  .card-brand-title { font-size: 20px; font-weight: 900; color: #fff; text-align: center; margin: 0 0 4px 0; } 
  .card-state-subtitle { font-size: 12px; color: rgba(255,255,255,0.4); text-align: center; margin-bottom: 12px; } 

  .card-categories-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; } 
  .card-mini-chip { background: rgba(0, 230, 118, 0.06); border: 1px solid rgba(0, 230, 118, 0.15); color: rgba(0, 230, 118, 0.85); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; } 

  .card-metrics-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 16px; margin-top: auto; } 
  .metric-pill-box { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; } 
  .metric-value { font-size: 13px; font-weight: 800; color: #fff; margin: 0; } 
  .metric-label { font-size: 9px; color: rgba(255,255,255,0.3); text-transform: uppercase; margin: 0; } 

  /* Right Side Scrollable Form Content */
  .form-section-scrollable { 
    color: #fff; 
    display: flex; flex-direction: column; gap: 24px; 
    background: rgba(255, 255, 255, 0.015) !important; 
    border: 1px solid rgba(255, 255, 255, 0.03) !important; 
    padding: 32px; border-radius: 18px !important; 
    box-sizing: border-box; 
  } 

  .form-group-premium { position: relative; display: flex; flex-direction: column; gap: 8px; } 
  .form-label-premium { font-size: 14px; font-weight: 600; color: rgba(255, 255, 255, 0.8); }

  .premium-input-box { 
    width: 100%; height: 44px; padding: 10px 14px; 
    border: 1px solid rgba(255, 255, 255, .05) !important;
    border-radius: 12px !important; background: rgba(255, 255, 255, .04) !important; 
    color: #fff !important; font-size: 14px; outline: none !important; box-sizing: border-box; 
  } 

  .premium-input-box:focus { 
    background: rgba(2, 22, 18, 0.7) !important; border-color: #00e676 !important;
    box-shadow: 0 0 20px rgba(0, 230, 118, 0.25) !important;
  }

  .social-input-row-premium { display: grid; grid-template-columns: 44px 1fr; gap: 12px; align-items: center; }
  .social-icon-box-premium { height: 44px; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); color: rgba(255, 255, 255, 0.6); } 

  #submitBtn {
    width: 100%; height: 50px; background: transparent; border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px; color: rgba(255, 255, 255, 0.8); font-size: 15px; font-weight: 700;
    cursor: pointer; transition: all 0.4s ease; margin-top: 12px;
  }
  #submitBtn:hover { color: #010707 !important; border-color: #00e676 !important; background: #00e676 !important; box-shadow: 0 0 30px rgba(0, 230, 118, 0.6) !important; } 

  @media(max-width: 1100px) { .onboarding-container { grid-template-columns: 1fr; } }
</style>

<div class="onboarding-container">
  <div class="creator-preview-card-9-16">
    <div class="card-avatar-container" id="avatarClickZone">
      <div class="card-avatar-inner">
        <i class="fa-solid fa-user-plus" id="avatarPlaceholderIcon"></i>
        <img id="cardAvatarImg" src="" style="display: none;">
        <div class="avatar-hover-overlay"><i class="fa-solid fa-camera"></i><span>Upload</span></div>
      </div>
    </div>
    <div>
      <h3 class="card-brand-title" id="previewBrandName">Your Brand Name</h3>
      <p class="card-state-subtitle" id="previewState">State, India</p>
      <div class="card-categories-row" id="previewCategoriesRow"><span class="card-mini-chip">Category</span></div>
    </div>
    <div class="card-metrics-footer">
      <div class="metric-pill-box">
        <i class="fa-brands fa-youtube" style="color: #ff0000;"></i>
        <p class="metric-value" id="previewYtSubs">0</p>
        <p class="metric-label">Subscribers</p>
      </div>
      <div class="metric-pill-box">
        <i class="fa-brands fa-instagram" style="color: #e1306c;"></i>
        <p class="metric-value" id="previewInstaFollowers">0</p>
        <p class="metric-label">Followers</p>
      </div>
    </div>
  </div>

  <div class="form-section-scrollable">
    <h2 style="margin: 0 0 8px 0; font-size: 24px; font-weight: 800; color: #00e676;">Creator Onboarding</h2>
    <p style="margin: 0 0 12px 0; color: rgba(255,255,255,0.5); font-size: 14px;">Fill in your details to setup your premium identity.</p>

    <div class="form-group-premium">
      <label class="form-label-premium">Real Name</label>
      <input type="text" id="realName" class="premium-input-box" placeholder="Enter your official name">
    </div>

    <div class="form-group-premium">
      <label class="form-label-premium">Brand / Channel Name</label>
      <input type="text" id="brandName" class="premium-input-box" placeholder="e.g. Technical Guru">
    </div>

    <div class="form-group-premium">
      <label class="form-label-premium">WhatsApp Number</label>
      <input type="text" id="whatsapp" class="premium-input-box" placeholder="Enter active WhatsApp line">
    </div>

    <div class="form-group-premium">
      <label class="form-label-premium">Business Email</label>
      <input type="email" id="email" class="premium-input-box" placeholder="name@example.com">
    </div>

    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
      <div class="form-group-premium">
        <label class="form-label-premium">Gender</label>
        <select id="gender" class="premium-input-box">
          <option value="" disabled selected hidden>Select...</option>
          <option value="Male">Male</option>
          <option value="Female">Female</option>
        </select>
      </div>
      <div class="form-group-premium">
        <label class="form-label-premium">State Location</label>
        <input type="text" id="stateSearch" class="premium-input-box" placeholder="Search state...">
      </div>
    </div>

    <div class="form-group-premium">
      <label class="form-label-premium">YouTube Link & Subscribers</label>
      <div class="social-input-row-premium">
        <div class="social-icon-box-premium"><i class="fa-brands fa-youtube"></i></div>
        <input type="text" id="ytLink" class="premium-input-box" placeholder="YouTube Link">
      </div>
      <input type="text" id="ytSubs" class="premium-input-box" placeholder="Subscribers Count" style="margin-top: 8px;">
    </div>

    <div class="form-group-premium">
      <label class="form-label-premium">Instagram Handle & Followers</label>
      <div class="social-input-row-premium">
        <div class="social-icon-box-premium"><i class="fa-brands fa-instagram"></i></div>
        <input type="text" id="instaLink" class="premium-input-box" placeholder="Instagram Link">
      </div>
      <input type="text" id="instaFollowers" class="premium-input-box" placeholder="Followers Count" style="margin-top: 8px;">
    </div>

    <button id="submitBtn" type="button">Save Profile Identity</button>
  </div>
</div>

<script>
  // 🟢 IMPORTANT FIX: UI INPUT LIVE SYNC SCRIPT
  // Is script ke neeche aap apna original Google Auth/Firebase redirect script jo PDF me tha, use bina chhede paste kar dena!
  document.getElementById('brandName').addEventListener('input', (e) => {
    document.getElementById('previewBrandName').textContent = e.target.value.trim() || "Your Brand Name";
  });
  document.getElementById('stateSearch').addEventListener('input', (e) => {
    document.getElementById('previewState').textContent = e.target.value.trim() ? e.target.value.trim() + ", India" : "State, India";
  });
  document.getElementById('ytSubs').addEventListener('input', (e) => {
    document.getElementById('previewYtSubs').textContent = e.target.value.trim() || "0";
  });
  document.getElementById('instaFollowers').addEventListener('input', (e) => {
    document.getElementById('previewInstaFollowers').textContent = e.target.value.trim() || "0";
  });
</script>
