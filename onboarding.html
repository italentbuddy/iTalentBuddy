<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creator Onboarding | iTalentBuddy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 50% 50%, #021414 0%, #000606 100%);
            color: #fff; min-height: 100vh; display: flex; align-items: center; justify-content: center;
        }
        .form-card {
            background: rgba(4, 16, 16, 0.85); backdrop-filter: blur(20px);
            border: 1px solid rgba(0, 230, 118, 0.15); border-radius: 24px;
            width: 90%; max-width: 650px; padding: 40px; box-shadow: 0 20px 50px rgba(0,0,0,0.7);
        }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; font-size: 12px; color: #00e676; font-weight: 700; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 0.5px;}
        .input-group input, .input-group select {
            width: 100%; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px; padding: 14px; color: #fff; font-size: 14px; outline: none; transition: 0.3s;
        }
        .input-group input:focus, .input-group select:focus { border-color: #00e676; box-shadow: 0 0 10px rgba(0, 230, 118, 0.2); }
        .submit-btn {
            width: 100%; background: #00e676; color: #010707; font-weight: 800; text-transform: uppercase;
            padding: 16px; border: none; border-radius: 12px; cursor: pointer; font-size: 14px; box-shadow: 0 0 20px rgba(0,230,118,0.3); transition: 0.3s;
        }
        .submit-btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(0,230,118,0.5); }
    </style>
</head>
<body>

<div class="form-card">
    <h2 style="font-size: 28px; font-weight: 900; margin: 0 0 8px 0; letter-spacing: -0.5px;">Creator Ecosystem Entry</h2>
    <p style="color: rgba(255,255,255,0.45); font-size: 13px; margin: 0 0 30px 0;">Fill your profile metrics. Your card will automatically start appending from Card #19 onwards.</p>
    
    <form id="onboardingForm">
        <div class="input-group">
            <label>Full Name</label>
            <input type="text" id="c_name" placeholder="e.g. Technical Guruji" required>
        </div>
        <div class="input-group">
            <label>Social Handle</label>
            <input type="text" id="c_handle" placeholder="e.g. @tg_official" required>
        </div>
        <div class="input-group">
            <label>Location City</label>
            <input type="text" id="c_location" placeholder="e.g. Bangalore" required>
        </div>
        <div class="input-group">
            <label>Niche Category</label>
            <select id="c_niche">
                <option value="Tech & AI">Tech & AI</option>
                <option value="Fashion & Styling">Fashion & Styling</option>
                <option value="Travel Vlogs">Travel Vlogs</option>
                <option value="Gaming & Esport">Gaming & Esport</option>
                <option value="Finance & Biz">Finance & Biz</option>
            </select>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
            <div class="input-group">
                <label>YouTube Subscribers</label>
                <input type="text" id="c_subs" placeholder="e.g. 1.5M" required>
            </div>
            <div class="input-group">
                <label>Instagram Followers</label>
                <input type="text" id="c_followers" placeholder="e.g. 450K" required>
            </div>
        </div>
        <div class="input-group">
            <label>Avatar Photo URL</label>
            <input type="url" id="c_img" value="https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=150&q=80">
        </div>
        
        <button type="submit" class="submit-btn">Publish To Directory</button>
    </form>
</div>

<script>
    document.getElementById('onboardingForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const newCreator = {
            name: document.getElementById('c_name').value,
            handle: document.getElementById('c_handle').value,
            location: document.getElementById('c_location').value,
            niche: document.getElementById('c_niche').value,
            subs: document.getElementById('c_subs').value,
            followers: document.getElementById('c_followers').value,
            img: document.getElementById('c_img').value
        };

        // LocalStorage fallback ecosystem injection engine
        const existing = JSON.parse(localStorage.getItem('itb_local_creators') || '[]');
        existing.push(newCreator);
        localStorage.setItem('itb_local_creators', JSON.stringify(existing));

        // Return directly to the active ecosystem view state
        window.location.href = 'index.html?page=creators';
    });
</script>
</body>
</html>
