<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<style>

    display: grid;
    grid-template-columns: 360px 1fr; 
    gap: 28px; 
    width: 100%;
    justify-content: flex-start; 
    height: auto;

  }

    content: '';

    background: radial-gradient(circle, rgba(0, 230, 118, 0.03) 0%, transparent 70%); 
    pointer-events: none;
  } 

  .creator-preview-card-9-16:hover { 
    border-color: rgba(0, 230, 118, 0.2) !important;  
    box-shadow: 0 40px 80px rgba(0, 230, 118, 0.05);

  } 

  .card-node-tag {
    font-size: 9px;
    font-weight: 800;
    color: rgba(255,255,255,0.2);

  /* Interactive Embedded Upload & Profile Avatar Setup */
  .card-avatar-container { 
    width: 110px;

    border-radius: 50%;

    padding: 4px;

    cursor: pointer;

  } 

  .card-avatar-inner { 
    width: 100%; height: 100%; border-radius: 50%; 
    overflow: hidden; display: flex; align-items: center; justify-content: center; 
    background: rgba(255,255,255,0.02); position: relative; 
  } 

  .card-avatar-inner img { width: 100%; height: 100%; object-fit: cover; } 
  .card-avatar-inner i { font-size: 32px; color: rgba(0, 230, 118, 0.4); }  

  .avatar-hover-overlay { 
    position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
    background: rgba(1, 7, 7, 0.75); display: flex; flex-direction: column; 
    align-items: center; justify-content: center; opacity: 0; transition: opacity 0.25s ease; 
  } 

  .avatar-hover-overlay i { font-size: 16px; color: #00e676; margin-bottom: 2px; } 
  .avatar-hover-overlay span { font-size: 8px; font-weight: 700; color: #fff; letter-spacing: 0.5px; text-transform: uppercase; } 

  .card-avatar-container:hover .avatar-hover-overlay { opacity: 1; } 
  .card-avatar-container:hover { border-color: #00e676; box-shadow: 0 0 20px rgba(0, 230, 118, 0.3); } 

  /* Card Content Specs */

  .card-state-subtitle { font-size: 12px; color: rgba(255,255,255,0.4); font-weight: 500; margin: 0 0 16px 0; display: flex; align-items: center; justify-content: center; gap: 4px; } 
  .card-state-subtitle i { color: #00e676; font-size: 10px; }

  /* Dynamic Categories on Card */
  .card-categories-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 12px; height: 24px; } 
  .card-mini-chip { background: rgba(0, 230, 118, 0.06); border: 1px solid rgba(0, 230, 118, 0.15); color: rgba(0, 230, 118, 0.85); padding: 4px 10px; border-radius: 6px; font-size: 10px; font-weight: 700; letter-spacing: 0.2px; } 

  /* Split Metrics Grid Ecosystem */
  .card-metrics-footer { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; border-top: 1px solid rgba(255,255,255,0.04); padding-top: 16px; margin-top: auto; } 
  .metric-pill-box { background: rgba(255,255,255,0.01); border: 1px solid rgba(255,255,255,0.03); border-radius: 12px; padding: 10px; display: flex; flex-direction: column; align-items: center; gap: 4px; }

  /* Right Side Form Content wrapper */

    color: #fff; 
    display: flex; flex-direction: column; gap: 24px;

  /* 💎 FORM FIELD ARCHITECTURE */

  .form-label-premium { display: block; margin: 0 0 8px 0; font-weight: 700; font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; color: rgba(0, 230, 118, 0.6) !important; transition: all 0.3s ease !important; }

  .premium-input-box { 
    width: 100%; height: 44px; padding: 10px 14px; 
    border: 1px solid rgba(255, 255, 255, .05) !important; border-radius: 12px !important;

  .floating-dropdown { display: none; position: absolute; width: 100%; background: #0b1413 !important; border: 1px solid #00e676; border-radius: 12px; max-height: 200px; overflow-y: auto; z-index: 99999 !important; top: calc(100% + 4px); left: 0; box-shadow: 0 20px 50px rgba(0, 0, 0, 0.95); box-sizing: border-box; } 
  .dropdown-item { padding: 10px 14px; cursor: pointer; font-size: 13px; color: #cbdad1; transition: all 0.2s; } 
  .dropdown-item:hover { background: rgba(0, 230, 118, 0.15); color: #00e676; }

  /* CHIPS INSIDE INPUT SYSTEM */
  .premium-input-container-chips { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; min-height: 44px; padding: 6px 10px; border: 1px solid rgba(255, 255, 255, .05); border-radius: 12px; background: rgba(255, 255, 255, .04); box-sizing: border-box; transition: all 0.3s ease; } 
  .premium-input-container-chips:focus-within { background: rgba(2, 22, 18, 0.7); border-color: #00e676; box-shadow: 0 0 20px rgba(0, 230, 118, 0.25); }
  .premium-input-container-chips input { flex: 1; min-width: 120px; background: transparent !important; border: none !important; outline: none !important; color: #fff !important; font-size: 14px; height: 30px; padding: 0; }
  .category-chip { display: flex; align-items: center; gap: 6px; background: rgba(0, 230, 118, 0.08); border: 1px solid rgba(0, 230, 118, 0.3); color: #fff; padding: 4px 10px; border-radius: 8px; font-size: 12px; font-weight: 600; }
  .category-chip i { cursor: pointer; color: rgba(255,255,255,0.4); transition: color 0.2s; }
  .category-chip i:hover { color: #ff4444; }

  /* SOCIAL INPUT ARCHITECTURE */
  .social-input-row-premium { display: grid; grid-template-columns: 44px 1fr 110px; gap: 10px; align-items: center; width: 100%; position: relative; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important; } 
  .social-icon-box-premium { height: 44px; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 16px; background: rgba(255,255,255,0.03); color: rgba(255, 255, 255, 0.6); transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; overflow: hidden; } 
  .social-input-row-premium:hover .social-icon-box-premium { color: #00e676; background: rgba(0, 230, 118, 0.08); border-color: rgba(0, 230, 118, 0.4); transform: rotate(360deg) scale(1.1); box-shadow: 0 0 15px rgba(0, 230, 118, 0.4); } 

  /* GLOBAL CTA BUTTON */
  #submitBtn { height: 48px; margin-top: 12px; width: 100%; border: 1px solid rgba(0, 230, 118, 0.4) !important; border-radius: 12px !important; background: rgba(0, 230, 118, 0.04) !important; color: #00e676 !important; font-size: 14px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; cursor: pointer; position: relative; overflow: hidden; z-index: 1; transition: all 0.5s cubic-bezier(0.19, 1, 0.22, 1) !important; }
  #submitBtn::before { content: '' !important; position: absolute !important; top: 0; left: -100% !important; width: 100% !important; height: 100% !important; background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.4), transparent) !important; transition: all 0.6s ease !important; z-index: -1 !important; } 
  #submitBtn:hover { color: #ffffff !important; border-color: #00e676 !important; background: linear-gradient(45deg, #00e676, #00b853) !important; transform: scale(1.02) !important; letter-spacing: 2px !important; box-shadow: 0 0 30px rgba(0, 230, 118, 0.6), inset 0 0 15px rgba(255, 255, 255, 0.3) !important; } 
  #submitBtn:hover::before { left: 100% !important; } 

  @media(max-width: 1100px) { .onboarding-container { grid-template-columns: 1fr; height: auto; padding: 10px; } .left-profile-sidebar { max-width: 360px; margin: 0 auto; } .form-section-scrollable { height: auto; overflow-y: visible; padding: 20px; } }
  @media(max-width: 760px) { div[style*="grid-template-columns: repeat(3"] { grid-template-columns: 1fr !important; gap: 16px !important; } div[style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; gap: 14px !important; } }
  .social-input-row-premium { gap: 8px; }
</style>

<script type="module">
  import { doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
  const db = window.appDb;
  const uid = localStorage.getItem('userUid');
  let activeSelectedCategories = [];
  let profilePicFile = null;

  const indiaStates = [
    "Andhra Pradesh", "Arunachal Pradesh", "Assam", "Bihar", "Chhattisgarh", "Goa",
    "Gujarat", "Haryana", "Himachal Pradesh", "Jharkhand", "Karnataka", "Kerala", "Madhya Pradesh",
    "Maharashtra", "Manipur", "Meghalaya", "Mizoram", "Nagaland", "Odisha", "Punjab", "Rajasthan", "Sikkim",
    "Tamil Nadu", "Telangana", "Tripura", "Uttar Pradesh", "Uttarakhand", "West Bengal", "Andaman and Nicobar Islands", "Chandigarh",
    "Dadra and Nagar Haveli and Daman and Diu", "Delhi", "Jammu and Kashmir", "Ladakh", "Lakshadweep", "Puducherry"
  ];

  const comprehensiveCategories = [
    "Entertainment", "Gaming", "Public Speaking", "Marketing", "Sales", "E-commerce", "Investing",
    "Cryptocurrency", "Startups", "Artificial Intelligence", "Programming", "Cybersecurity", "Software", "Hardware",
    "Robotics", "Space", "Mathematics", "Physics", "Chemistry", "Biology", "Medicine", "Nursing",
    "Psychology", "Sociology", "Economics", "Archaeology", "Documentary", "Interviews", "Podcasts", "Talk Shows",
    "Reviews", "Reaction Content", "Commentary", "ASMR", "Comedy", "Horror", "Mystery", "True Crime", "Paranormal",
    "Survival", "Prepper", "Military", "Defense", "Fire & Rescue", "Social Issues", "Nonprofit", "Charity",
    "Community", "Events", "Festivals", "Celebrities", "Influencers", "Memes", "Internet Culture", "Streaming",
    "Esports", "Collectibles", "Antiques", "Trading Cards", "Education & Tutorials", "How-To Guides", "Unboxing",
    "Shopping", "Consumer Advice"
  ];

  const mainContainer = document.getElementById('mainOnboardingContainer');
  const brandInput = document.getElementById('brandName');
  const stateSearchInput = document.getElementById('stateSearch');
  const ytSubsInput = document.getElementById('ytSubs');
  const igFollowersInput = document.getElementById('igFollowers');

  const cardBrandPreview = document.getElementById('cardBrandNamePreview');
  const cardStatePreview = document.getElementById('cardStatePreview');
  const cardYtPreview = document.getElementById('cardYtMetric');
  const cardIgPreview = document.getElementById('cardIgMetric');
  const cardCategoriesWrapper = document.getElementById('cardCategoriesWrapper');

  function setDropdownState(active) {
    const rows = document.querySelectorAll('.social-input-row-premium');
    rows.forEach(row => {
      if(active) {
        row.classList.add('dropdown-active');
      } else {
        row.classList.remove('dropdown-active');
      }
    });
  }

  function syncFormToCard() {
    cardBrandPreview.innerText = brandInput.value.trim() !== "" ? brandInput.value.trim() : "YOUR BRAND";
    cardStatePreview.innerText = stateSearchInput.value.trim() !== "" ? stateSearchInput.value.trim() : "Location Node";
    cardYtPreview.innerText = ytSubsInput.value.trim() !== "" ? ytSubsInput.value.trim() : "0";
    cardIgPreview.innerText = igFollowersInput.value.trim() !== "" ? igFollowersInput.value.trim() : "0";

    cardCategoriesWrapper.innerHTML = "";
    if (activeSelectedCategories.length === 0) {
      cardCategoriesWrapper.innerHTML = `<span class="card-mini-chip" style="opacity: 0.3; background: transparent; border-style: dashed;">No Tag</span>`;
    } else {
      activeSelectedCategories.slice(0, 2).forEach(cat => {
        const span = document.createElement('span');
        span.className = 'card-mini-chip';
        span.innerText = cat;
        cardCategoriesWrapper.appendChild(span);
      });
    }
  }

  // Event Input Syncing
  brandInput.addEventListener('input', syncFormToCard);
  stateSearchInput.addEventListener('input', syncFormToCard);
  ytSubsInput.addEventListener('input', syncFormToCard);
  igFollowersInput.addEventListener('input', syncFormToCard);

  // State Dropdown Core Logic
  const stateDropdown = document.getElementById('stateDropdown');
  function renderStateDropdown(filter = "") {
    stateDropdown.innerHTML = "";
    if(!filter) { stateDropdown.style.display = 'none'; setDropdownState(false); return; }
    const filtered = indiaStates.filter(s => s.toLowerCase().includes(filter.toLowerCase()));
    if(filtered.length === 0) { stateDropdown.style.display = 'none'; setDropdownState(false); return; }

    filtered.forEach(state => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.innerText = state;
      div.addEventListener('click', () => {
        stateSearchInput.value = state;
        stateDropdown.style.display = 'none';
        setDropdownState(false);
        syncFormToCard();
      });
      stateDropdown.appendChild(div);
    });
  }

  stateSearchInput.addEventListener('input', (e) => {
    renderStateDropdown(e.target.value);
    stateDropdown.style.display = 'block';
    setDropdownState(true);
  });

  stateSearchInput.addEventListener('focus', () => {
    renderStateDropdown(stateSearchInput.value);
    if(stateSearchInput.value) {
      stateDropdown.style.display = 'block';
      setDropdownState(true);
    }
  });

  // Chips & Category Logic
  const chipsWrapper = document.getElementById('categoryChipsWrapper');
  const categorySearch = document.getElementById('categorySearch');
  const categoryDropdown = document.getElementById('categoryDropdown');

  function renderChips() {
    document.querySelectorAll('.category-chip').forEach(el => el.remove());
    activeSelectedCategories.forEach(cat => {
      const chip = document.createElement('div');
      chip.className = 'category-chip';
      chip.innerHTML = `${cat} <i class="fa-solid fa-xmark"></i>`;
      chip.querySelector('i').addEventListener('click', (e) => {
        e.stopPropagation();
        activeSelectedCategories = activeSelectedCategories.filter(item => item !== cat);
        renderChips();
        syncFormToCard();
        categorySearch.placeholder = activeSelectedCategories.length === 0 ? "Type domain (e.g. Gaming, Finance)..." : "";
      });
      chipsWrapper.insertBefore(chip, categorySearch);
    });
    syncFormToCard();
  }

  function renderCategoryDropdown(filter = "") {
    categoryDropdown.innerHTML = "";
    if (activeSelectedCategories.length >= 5) {
      categoryDropdown.style.display = 'none';
      setDropdownState(false);
      return;
    }
    const filtered = comprehensiveCategories.filter(c => c.toLowerCase().includes(filter.toLowerCase()) && !activeSelectedCategories.includes(c));
    if(filtered.length === 0) { categoryDropdown.style.display = 'none'; setDropdownState(false); return; }

    filtered.forEach(cat => {
      const div = document.createElement('div');
      div.className = 'dropdown-item';
      div.innerText = cat;
      div.addEventListener('click', () => {
        activeSelectedCategories.push(cat);
        categorySearch.value = "";
        categoryDropdown.style.display = 'none';
        setDropdownState(false);
        renderChips();
        categorySearch.placeholder = "";
        categorySearch.focus();
      });
      categoryDropdown.appendChild(div);
    });
  }

  chipsWrapper.addEventListener('click', () => categorySearch.focus());
  categorySearch.addEventListener('focus', () => {
    renderCategoryDropdown(categorySearch.value);
    categoryDropdown.style.display = 'block';
    setDropdownState(true);
  });
  categorySearch.addEventListener('input', (e) => {
    renderCategoryDropdown(e.target.value);
    setDropdownState(true);
  });

  document.addEventListener('click', (e) => {
    if(!stateSearchInput.contains(e.target) && !stateDropdown.contains(e.target)) {
      stateDropdown.style.display = 'none';
    }
    if(!chipsWrapper.contains(e.target) && !categoryDropdown.contains(e.target)) {
      categoryDropdown.style.display = 'none';
    }
    if (stateDropdown.style.display === 'none' && categoryDropdown.style.display === 'none') {
      setDropdownState(false);
    }
  });

  // Profile Picture Handling
  const fileInput = document.getElementById('profilePicInput');
  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if(file) {
      profilePicFile = file;
      const reader = new FileReader();
      reader.onload = function(event) {
        document.getElementById('cardDefaultAvatarIcon').style.display = 'none';
        const img = document.getElementById('cardAvatarImg');
        img.src = event.target.result;
        img.style.display = 'block';
      };
      reader.readAsDataURL(file);
    }
  });

  // Prefill Validation Sync
  async function initPrefillPipeline() {
    if(!db || !uid) return;
    if(localStorage.getItem('userEmail')) document.getElementById('email').value = localStorage.getItem('userEmail');
    
    try {
      const docRef = doc(db, "creators", uid);
      const docSnap = await getDoc(docRef);
      if (docSnap.exists()) {
        const data = docSnap.data();
        if(data.realName) document.getElementById('realName').value = data.realName;
        if(data.brandName) { brandInput.value = data.brandName; }
        if(data.whatsapp) document.getElementById('whatsapp').value = data.whatsapp;
        if(data.gender) document.getElementById('gender').value = data.gender;
        if(data.state) { stateSearchInput.value = data.state; }
        if(data.categories) { activeSelectedCategories = data.categories; renderChips(); }
        if(data.youtubeLink) document.getElementById('ytLink').value = data.youtubeLink;
        if(data.youtubeSubs) { ytSubsInput.value = data.youtubeSubs; }
        if(data.instagramLink) document.getElementById('igLink').value = data.instagramLink;
        if(data.instagramFollowers) { igFollowersInput.value = data.instagramFollowers; }
        if(data.xLink) document.getElementById('xLink').value = data.xLink;
        if(data.xMetrics) document.getElementById('xMetrics').value = data.xMetrics;
        if(data.fbLink) document.getElementById('fbLink').value = data.fbLink;
        if(data.fbMetrics) document.getElementById('fbMetrics').value = data.fbMetrics;
        if(data.kickLink) document.getElementById('kickLink').value = data.kickLink;
        if(data.kickMetrics) document.getElementById('kickMetrics').value = data.kickMetrics;
        if(data.discordLink) document.getElementById('discordLink').value = data.discordLink;
        if(data.discordMetrics) document.getElementById('discordMetrics').value = data.discordMetrics;
        
        if(data.profilePicUrl) {
          document.getElementById('cardDefaultAvatarIcon').style.display = 'none';
          const img = document.getElementById('cardAvatarImg');
          img.src = data.profilePicUrl;
          img.style.display = 'block';
        }
        syncFormToCard();
      }
    } catch (err) {
      console.error("Prefill pipeline broken: ", err);
    }
  }

  // Handle Form Submission
  document.getElementById('onboardingForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    if(!db || !uid) { alert("Session Context Error. Re-login required."); return; }
    
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.innerText = "Processing Node...";
    submitBtn.disabled = true;

    try {
      let uploadedPicUrl = "";
      const currentImg = document.getElementById('cardAvatarImg').src;
      if(currentImg && currentImg.startsWith('http')) {
        uploadedPicUrl = currentImg;
      }
      
      if(profilePicFile) {
        const formData = new FormData();
        formData.append('file', profilePicFile);
        formData.append('upload_preset', 'ml_default'); 
        
        const res = await fetch(`https://api.cloudinary.com/v1_1/dsk97b6g3/image/upload`, {
          method: 'POST',
          body: formData
        });
        const fileData = await res.json();
        uploadedPicUrl = fileData.secure_url || "";
      }

      const profileData = {
        realName: document.getElementById('realName').value,
        brandName: brandInput.value,
        whatsapp: document.getElementById('whatsapp').value,
        email: document.getElementById('email').value,
        gender: document.getElementById('gender').value,
        state: stateSearchInput.value,
        categories: activeSelectedCategories,
        youtubeLink: document.getElementById('ytLink').value,
        youtubeSubs: ytSubsInput.value,
        instagramLink: document.getElementById('igLink').value,
        instagramFollowers: igFollowersInput.value,
        xLink: document.getElementById('xLink').value,
        xMetrics: document.getElementById('xMetrics').value,
        fbLink: document.getElementById('fbLink').value,
        fbMetrics: document.getElementById('fbMetrics').value,
        kickLink: document.getElementById('kickLink').value,
        kickMetrics: document.getElementById('kickMetrics').value,
        discordLink: document.getElementById('discordLink').value,
        discordMetrics: document.getElementById('discordMetrics').value,
        profilePicUrl: uploadedPicUrl,
        onboardingComplete: true,
        updatedAt: new Date().toISOString()
      };

      await setDoc(doc(db, "creators", uid), profileData, { merge: true });
      window.location.href = "home.html";
    } catch(error) {
      console.error("Submission blocked: ", error);
      alert("Pipeline failure sync database. Trace log active.");
    } finally {
      submitBtn.innerText = "Save and Exit";
      submitBtn.disabled = false;
    }
  });

  window.addEventListener('DOMContentLoaded', initPrefillPipeline);
</script>
